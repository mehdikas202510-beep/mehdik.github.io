<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mehdik - Home</title>
  <style>
    :root{--glass-bg:rgba(255,255,255,.12)}
    *{box-sizing:border-box}
    body{
      min-height:100vh;margin:0;padding:20px;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      background:radial-gradient(circle at top,#00c6ff 0,#007aff 45%,#001b4d 100%);
      color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif
    }
    h1{font-size:2.2rem;font-weight:800;margin:0 0 10px;text-shadow:0 10px 25px rgba(0,0,0,.3);text-align:center}
    p{margin:0 0 18px;opacity:.9;text-align:center;max-width:720px}
    .box{
      width:100%;max-width:720px;background:var(--glass-bg);
      border-radius:18px;padding:22px;
      box-shadow:0 18px 45px rgba(0,0,0,.45);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.25);
      display:flex;flex-direction:column;gap:14px
    }
    .btn{
      width:100%;
      padding:14px 12px;border-radius:999px;border:none;
      font-weight:900;font-size:1.02rem;cursor:pointer;
      box-shadow:0 12px 28px rgba(0,0,0,.45);
      transition:transform .15s ease, filter .15s ease
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
    .primary{background:linear-gradient(135deg,#16a34a,#22c55e);color:#f9fff9}
    .secondary{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#f9fff9}
    .note{font-size:.85rem;opacity:.85;line-height:1.45}
  </style>
</head>
<body>
  <h1>Benvenuto</h1>
  <p>Scegli il tipo di registrazione:</p>

  <div class="box">
    <button class="btn secondary" onclick="location.href='/Agenzia/'">Sono un'agenzia</button>
    <button class="btn primary" onclick="location.href='/cliente/'">Sono un cliente</button>

    <div class="note">
      • Cliente: التسجيل العادي (صفحتك الحالية).<br/>
      • Agenzia: إرسال عدة عملاء في رسالة واحدة عبر خيار <b>Molti</b>.
    </div>
  </div>
</body>
</html>

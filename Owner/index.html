<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Owner Panel</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --panel:#ffffff;
      --line:#e5eaf2;
      --text:#0f172a;
      --muted:#64748b;
      --brand:#2563eb;
      --brand-2:#eff6ff;
      --good:#16a34a;
      --warn:#d97706;
      --bad:#dc2626;
      --radius:20px;
      --shadow:0 18px 40px rgba(15,23,42,.07);
      --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans Arabic","Noto Sans",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef3f9 100%);color:var(--text);font-family:var(--sans)}
    button,input,select,textarea{font:inherit}
    .app{max-width:1560px;margin:0 auto;padding:20px}
    .shell{display:grid;grid-template-columns:300px 1fr;gap:18px;min-height:calc(100vh - 40px)}
    @media (max-width:1200px){.shell{grid-template-columns:1fr}}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .sidebar{padding:18px;display:flex;flex-direction:column;gap:16px;position:sticky;top:20px;height:fit-content}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#60a5fa,#2563eb);box-shadow:0 10px 22px rgba(37,99,235,.22)}
    .brand h1{margin:0;font-size:20px}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .stack{display:flex;flex-direction:column;gap:10px}
    .field{display:flex;flex-direction:column;gap:7px}
    .field label{font-size:12px;color:var(--muted)}
    .input, .select, .textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 14px;outline:none;color:var(--text)}
    .textarea{min-height:220px;resize:vertical;font-family:var(--mono);font-size:12px;direction:ltr;text-align:left}
    .input:focus,.select:focus,.textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.08)}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:16px;padding:11px 14px;cursor:pointer;font-weight:700;transition:.16s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
    .btn.soft{background:var(--brand-2);border-color:#bfdbfe;color:#1d4ed8}
    .btn.good{background:#f0fdf4;border-color:#bbf7d0;color:#166534}
    .btn.warn{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
    .btn.danger{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
    .btn.block{width:100%}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat{padding:14px;border:1px solid var(--line);border-radius:18px;background:#fafcff}
    .stat b{display:block;font-size:24px}
    .stat span{font-size:12px;color:var(--muted)}
    .nav{display:flex;gap:10px}
    .nav button{flex:1}
    .nav .active{background:#0f172a;border-color:#0f172a;color:#fff}
    .badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 10px;color:var(--muted);font-size:12px}
    .dot{width:8px;height:8px;border-radius:999px;background:#cbd5e1}
    .main{display:flex;flex-direction:column;gap:18px}
    .toolbar{padding:18px;display:flex;justify-content:space-between;gap:14px;align-items:center;flex-wrap:wrap}
    .toolbar h2{margin:0;font-size:20px}
    .toolbar p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .toolbar .right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .content{padding:18px}
    .section{display:none}
    .section.active{display:block}
    .filters{display:grid;grid-template-columns:260px 1fr 200px 260px;gap:10px;margin-bottom:14px}
    @media (max-width:1300px){.filters{grid-template-columns:1fr 1fr}}
    @media (max-width:760px){.filters{grid-template-columns:1fr}}
    .tablebox{overflow:auto;border:1px solid var(--line);border-radius:20px;background:#fff}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:980px}
    thead th{position:sticky;top:0;background:#f8fafc;border-bottom:1px solid var(--line);padding:13px 12px;text-align:right;font-size:12px;color:var(--muted);white-space:nowrap}
    tbody td{padding:13px 12px;border-bottom:1px solid #edf2f7;font-size:13px;white-space:nowrap;vertical-align:middle}
    tbody tr:hover{background:#fafcff}
    .status{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;border:1px solid var(--line);background:#fff}
    .status.done{background:#f0fdf4;border-color:#bbf7d0;color:#166534}.status.done .dot{background:var(--good)}
    .status.progress{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}.status.progress .dot{background:#2563eb}
    .status.rejected{background:#fef2f2;border-color:#fecaca;color:#991b1b}.status.rejected .dot{background:var(--bad)}
    .status.pending{background:#fff7ed;border-color:#fed7aa;color:#9a3412}.status.pending .dot{background:var(--warn)}
    .mono{font-family:var(--mono);direction:ltr;text-align:left;display:inline-block}
    .managergrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
    .manager{border:1px solid var(--line);border-radius:22px;padding:16px;background:linear-gradient(180deg,#fff,#fbfdff)}
    .managerhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .manager h3{margin:0;font-size:16px}.manager small{color:var(--muted)}
    .managerstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .managerstats div{border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff;text-align:center}
    .managerstats b{display:block;font-size:18px}.managerstats span{font-size:11px;color:var(--muted)}
    .queue{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff}
    .queueitem{display:flex;justify-content:space-between;gap:10px;padding:12px;border-bottom:1px solid #edf2f7}
    .queueitem:last-child{border-bottom:none}
    .queueitem strong{display:block;font-size:13px}.queueitem small{color:var(--muted)}
    .empty{padding:30px 18px;text-align:center;color:var(--muted)}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.34);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
    .modal.show{display:flex}
    .dialog{width:min(760px,100%);background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 25px 80px rgba(15,23,42,.22);overflow:hidden}
    .dialog .head,.dialog .foot{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .dialog .foot{border-bottom:none;border-top:1px solid var(--line);justify-content:flex-start;flex-wrap:wrap}
    .dialog .body{padding:18px}
    .dialog h3{margin:0;font-size:18px}
    .split2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:760px){.split2{grid-template-columns:1fr}}
    .toast{position:fixed;left:20px;bottom:20px;background:#111827;color:#fff;padding:14px 16px;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.3);display:none;z-index:80;max-width:420px}
    .toast.show{display:block}
    .toast b{display:block;font-size:13px;margin-bottom:4px}.toast div{font-size:12px;line-height:1.6;color:#cbd5e1;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <aside class="panel sidebar">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1>Owner Panel</h1>
            <p id="apiHost">...</p>
          </div>
        </div>

        <div class="stack">
          <div class="field"><label>Owner User</label><input id="inUser" class="input" autocomplete="username" /></div>
          <div class="field"><label>Owner Pass</label><input id="inPass" class="input" type="password" autocomplete="current-password" /></div>
          <div class="row">
            <button id="btnLogin" class="btn primary block">Login</button>
            <button id="btnLogout" class="btn danger block" disabled>Logout</button>
          </div>
        </div>

        <div class="statgrid">
          <div class="stat"><b id="statAgencies">0</b><span>Agencies</span></div>
          <div class="stat"><b id="statAccounts">0</b><span>Accounts</span></div>
          <div class="stat"><b id="statManagers">0</b><span>Managers</span></div>
          <div class="stat"><b id="statSelected">0</b><span>Selected</span></div>
        </div>

        <div class="nav">
          <button class="btn active" data-section="accounts">Accounts</button>
          <button class="btn" data-section="managers">Managers</button>
        </div>

        <div class="stack">
          <div class="badge"><span class="dot" id="authDot"></span><span id="authState">Guest</span></div>
          <button id="btnRefreshAll" class="btn soft" disabled>Refresh</button>
          <button id="btnPing" class="btn" disabled>Ping</button>
        </div>
      </aside>

      <main class="main">
        <section class="panel section active" id="section-accounts">
          <div class="toolbar">
            <div>
              <h2>Accounts</h2>
              <p id="selectedAgencyLabel">—</p>
            </div>
            <div class="right">
              <button id="btnSendAgency" class="btn" disabled>Send Agency → Telegram</button>
              <button id="btnBulk" class="btn" disabled>Bulk</button>
              <button id="btnNewAccount" class="btn primary" disabled>New Account</button>
            </div>
          </div>
          <div class="content">
            <div class="filters">
              <div class="field">
                <label>Agency</label>
                <select id="selAgency" class="select" disabled></select>
              </div>
              <div class="field">
                <label>Search</label>
                <input id="inSearch" class="input" disabled />
              </div>
              <div class="field">
                <label>Status</label>
                <select id="selStatus" class="select" disabled>
                  <option value="">All</option>
                  <option value="Done">Done</option>
                  <option value="In Progress">In Progress</option>
                  <option value="Rejected">Rejected</option>
                  <option value="Pending">Pending</option>
                </select>
              </div>
              <div class="field">
                <label>Manager</label>
                <select id="selManager" class="select" disabled></select>
              </div>
            </div>
            <div class="tablebox">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Passport</th>
                    <th>Status</th>
                    <th>Manager</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="accountsBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="panel section" id="section-managers">
          <div class="toolbar">
            <div>
              <h2>Managers</h2>
              <p id="managerTitleSub">—</p>
            </div>
            <div class="right">
              <button id="btnNewManager" class="btn primary" disabled>New Manager</button>
            </div>
          </div>
          <div class="content">
            <div id="managerGrid" class="managergrid"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal" id="accountModal">
    <div class="dialog">
      <div class="head">
        <h3 id="accountModalTitle">Account</h3>
        <button class="btn" onclick="closeAccountModal()">Close</button>
      </div>
      <div class="body">
        <div class="split2">
          <div class="field"><label>Email</label><input id="accEmail" class="input" /></div>
          <div class="field"><label>Password</label><input id="accPassword" class="input" /></div>
          <div class="field"><label>Passport</label><input id="accPassport" class="input" /></div>
          <div class="field"><label>Status</label>
            <select id="accStatus" class="select">
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Rejected">Rejected</option>
              <option value="Done">Done</option>
            </select>
          </div>
        </div>
      </div>
      <div class="foot">
        <button id="btnSaveAccount" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <div class="modal" id="bulkModal">
    <div class="dialog">
      <div class="head">
        <h3>Bulk</h3>
        <button class="btn" onclick="closeBulkModal()">Close</button>
      </div>
      <div class="body">
        <div class="field">
          <label>accounts</label>
          <textarea id="bulkText" class="textarea" placeholder="email;password;passport&#10;email;password;passport"></textarea>
        </div>
      </div>
      <div class="foot">
        <button id="btnBulkCheck" class="btn">Check</button>
        <button id="btnBulkSave" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <div class="modal" id="managerModal">
    <div class="dialog">
      <div class="head">
        <h3 id="managerModalTitle">Manager</h3>
        <button class="btn" onclick="closeManagerModal()">Close</button>
      </div>
      <div class="body">
        <div class="split2">
          <div class="field"><label>ID</label><input id="mgrId" class="input" /></div>
          <div class="field"><label>Name</label><input id="mgrName" class="input" /></div>
          <div class="field"><label>Limit</label><input id="mgrLimit" class="input" type="number" min="1" max="200" /></div>
          <div class="field"><label>State</label>
            <select id="mgrActive" class="select">
              <option value="true">Active</option>
              <option value="false">Inactive</option>
            </select>
          </div>
        </div>
      </div>
      <div class="foot">
        <button id="btnSaveManager" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"><b id="toastTitle"></b><div id="toastText"></div></div>

  <script>
    const API_BASE = (() => {
      const q = new URLSearchParams(location.search).get('api');
      if (q) return q.replace(/\/$/, '');
      const stored = sessionStorage.getItem('owner_api_base');
      if (stored) return stored;
      return location.origin.replace(/\/$/, '');
    })();
    sessionStorage.setItem('owner_api_base', API_BASE);
    const OWNER_BASE = API_BASE + '/owner';
    const STORE_KEY = 'owner_rebuilt_session_v1';

    const S = {
      user:'', pass:'', agencies:[], accounts:[], managers:[], assigned:{}, selectedAgency:'', selectedManager:'', accountMode:'add', managerMode:'add', editMatch:null
    };

    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    const clean = (v) => String(v ?? '').trim();
    const nEmail = (v) => clean(v).toLowerCase();
    const nPassport = (v) => clean(v).toUpperCase();
    const nAgency = (v) => clean(v).toLowerCase();
    const accId = (agency,email,passport) => `${nAgency(agency)}||${nEmail(email)}||${nPassport(passport)}`;

    function toast(title, text){
      $('toastTitle').textContent = title;
      $('toastText').textContent = text;
      $('toast').classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => $('toast').classList.remove('show'), 3200);
    }

    function persist(){
      sessionStorage.setItem(STORE_KEY, JSON.stringify({ user:S.user, pass:S.pass, selectedAgency:S.selectedAgency, selectedManager:S.selectedManager }));
    }

    function restore(){
      try{
        const x = JSON.parse(sessionStorage.getItem(STORE_KEY) || '{}');
        S.user = clean(x.user); S.pass = clean(x.pass); S.selectedAgency = clean(x.selectedAgency); S.selectedManager = clean(x.selectedManager);
      }catch{}
      $('inUser').value = S.user;
      $('inPass').value = S.pass;
    }

    function authHeaders(){ return { 'X-Owner-User': S.user, 'X-Owner-Pass': S.pass }; }

    async function apiFetch(url, opts={}){
      const res = await fetch(url, opts).catch(() => null);
      if (!res) return { ok:false, error:'Network error' };
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return { ok:false, error:data.error || ('HTTP ' + res.status), ...data };
      return data;
    }

    const api = {
      login:(user,pass)=>apiFetch(OWNER_BASE+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,pass})}),
      ping:()=>apiFetch(OWNER_BASE+'/ping',{headers:authHeaders()}),
      agencies:()=>apiFetch(OWNER_BASE+'/agencies',{headers:authHeaders()}),
      accounts:(agency)=>apiFetch(OWNER_BASE+'/accounts?agency='+encodeURIComponent(agency),{headers:authHeaders()}),
      createAccount:(payload)=>apiFetch(OWNER_BASE+'/account',{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      updateAccount:(payload)=>apiFetch(OWNER_BASE+'/account',{method:'PUT',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      deleteAccount:(payload)=>apiFetch(OWNER_BASE+'/account',{method:'DELETE',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      sendAgency:(agency)=>apiFetch(OWNER_BASE+'/agency/send-all',{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify({agency})}),
      managers:()=>apiFetch(OWNER_BASE+'/managers',{headers:authHeaders()}),
      createManager:(payload)=>apiFetch(OWNER_BASE+'/manager',{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      updateManager:(payload)=>apiFetch(OWNER_BASE+'/manager',{method:'PUT',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      deleteManager:(payload)=>apiFetch(OWNER_BASE+'/manager',{method:'DELETE',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      managerSelect:(payload)=>apiFetch(OWNER_BASE+'/manager/select',{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      managerUnselect:(payload)=>apiFetch(OWNER_BASE+'/manager/unselect',{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      managerStatus:(payload)=>apiFetch(OWNER_BASE+'/manager/status',{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(payload)}),
      bulkCheck:(agency,accounts)=>{
        const fd = new FormData(); fd.set('formType','agency'); fd.set('firma',agency); fd.set('action','check'); fd.set('molti','1'); fd.set('accounts',accounts);
        return apiFetch(API_BASE,{method:'POST',headers:authHeaders(),body:fd});
      },
      bulkSave:(agency,accounts)=>{
        const fd = new FormData(); fd.set('formType','agency'); fd.set('firma',agency); fd.set('action','add'); fd.set('molti','1'); fd.set('accounts',accounts);
        return apiFetch(API_BASE,{method:'POST',headers:authHeaders(),body:fd});
      }
    };

    function setAuth(on){
      $('authState').textContent = on ? S.user : 'Guest';
      $('authDot').style.background = on ? '#16a34a' : '#cbd5e1';
      ['btnLogout','btnRefreshAll','btnPing','selAgency','inSearch','selStatus','selManager','btnSendAgency','btnBulk','btnNewAccount','btnNewManager'].forEach(id => $(id).disabled = !on);
      $('btnLogin').disabled = false;
    }

    function statusClass(status){
      if (status === 'Done') return 'done';
      if (status === 'In Progress') return 'progress';
      if (status === 'Rejected') return 'rejected';
      return 'pending';
    }

    function sortStatus(list){
      const p = {Done:0,'In Progress':1,Rejected:2,Pending:3};
      return list.slice().sort((a,b)=>{
        const x=(p[a.status] ?? 99)-(p[b.status] ?? 99);
        if (x) return x;
        return accId(a.agency || S.selectedAgency, a.email, a.passport).localeCompare(accId(b.agency || S.selectedAgency, b.email, b.passport));
      });
    }

    function rebuildAssigned(){
      S.assigned = {};
      for (const m of S.managers) {
        for (const q of (m.queue || [])) S.assigned[accId(q.agency, q.email, q.passport)] = m.id;
      }
    }

    function renderAgencies(){
      const sel = $('selAgency');
      sel.innerHTML = '<option value="">Select agency</option>';
      S.agencies.forEach(a => {
        const o = document.createElement('option');
        o.value = a.agency;
        o.textContent = `${a.agency} (${a.count})`;
        sel.appendChild(o);
      });
      if (S.selectedAgency) sel.value = S.selectedAgency;
      $('statAgencies').textContent = S.agencies.length;
      $('selectedAgencyLabel').textContent = S.selectedAgency || '—';
    }

    function renderManagerSelect(){
      const sel = $('selManager');
      sel.innerHTML = '<option value="">No manager</option>';
      S.managers.forEach(m => {
        const o = document.createElement('option');
        o.value = m.id;
        o.textContent = `${m.name} (${m.assignedCount || 0}/${m.desiredCount})`;
        sel.appendChild(o);
      });
      if (S.selectedManager) sel.value = S.selectedManager;
      $('statManagers').textContent = S.managers.length;
      $('statSelected').textContent = Object.keys(S.assigned).length;
      $('managerTitleSub').textContent = `${S.managers.length} managers`;
    }

    function filteredAccounts(){
      let list = sortStatus(S.accounts);
      const q = clean($('inSearch').value).toLowerCase();
      const st = $('selStatus').value;
      if (st) list = list.filter(a => a.status === st);
      if (q) list = list.filter(a => [a.email,a.password,a.passport,a.status].some(v => String(v||'').toLowerCase().includes(q)));
      return list;
    }

    function accountActions(a){
      const id = accId(S.selectedAgency, a.email, a.passport);
      const selectedBy = S.assigned[id];
      const selectedManager = clean($('selManager').value);
      const canSelect = selectedManager && (a.status === 'Pending' || a.status === 'In Progress');
      let managerCell = '<span class="badge">—</span>';
      if (selectedBy) {
        const m = S.managers.find(x => x.id === selectedBy);
        managerCell = `<span class="badge">${esc(m?.name || selectedBy)}</span>`;
      }
      let pick = '<span class="badge">—</span>';
      if (selectedBy && selectedManager && selectedBy === selectedManager) {
        pick = `<button class="btn danger" onclick="unselectAccount('${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}')">Remove</button>`;
      } else if (selectedBy) {
        pick = '<span class="badge">Locked</span>';
      } else if (canSelect) {
        pick = `<button class="btn soft" onclick="selectAccount('${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}')">Select</button>`;
      }
      return { managerCell, pick };
    }

    function renderAccounts(){
      const body = $('accountsBody');
      const list = filteredAccounts();
      $('statAccounts').textContent = list.length;
      if (!S.selectedAgency) {
        body.innerHTML = '<tr><td colspan="7" class="empty">Select agency</td></tr>';
        return;
      }
      if (!list.length) {
        body.innerHTML = '<tr><td colspan="7" class="empty">Empty</td></tr>';
        return;
      }
      body.innerHTML = list.map((a,i) => {
        const act = accountActions(a);
        return `<tr>
          <td>${i+1}</td>
          <td class="mono">${esc(a.email)}</td>
          <td class="mono">${esc(a.password || '')}</td>
          <td class="mono">${esc(a.passport)}</td>
          <td><span class="status ${statusClass(a.status)}"><span class="dot"></span>${esc(a.status)}</span></td>
          <td>${act.managerCell}</td>
          <td>
            <div class="row">
              ${act.pick}
              <button class="btn" onclick="openEditAccount('${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}')">Edit</button>
              <button class="btn danger" onclick="removeAccount('${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}')">Delete</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    function renderManagers(){
      const wrap = $('managerGrid');
      if (!S.managers.length) {
        wrap.innerHTML = '<div class="panel empty">Empty</div>';
        return;
      }
      wrap.innerHTML = S.managers.map(m => {
        const queue = sortStatus(m.queue || []);
        const items = queue.length ? queue.map(q => `
          <div class="queueitem">
            <div>
              <strong>${esc(q.agency)}</strong>
              <small class="mono">${esc(q.email)}</small><br>
              <small class="mono">${esc(q.passport)}</small>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
              <span class="status ${statusClass(q.status)}"><span class="dot"></span>${esc(q.status)}</span>
              <div class="row">
                <button class="btn good" onclick="managerSetStatus('${escJs(m.id)}','${escJs(q.agency)}','${encodeURIComponent(q.email)}','${encodeURIComponent(q.passport)}','Done')">Done</button>
                <button class="btn warn" onclick="managerSetStatus('${escJs(m.id)}','${escJs(q.agency)}','${encodeURIComponent(q.email)}','${encodeURIComponent(q.passport)}','In Progress')">In Progress</button>
                <button class="btn danger" onclick="managerSetStatus('${escJs(m.id)}','${escJs(q.agency)}','${encodeURIComponent(q.email)}','${encodeURIComponent(q.passport)}','Rejected')">Rejected</button>
              </div>
            </div>
          </div>`).join('') : '<div class="empty">Empty</div>';
        return `<div class="manager">
          <div class="managerhead">
            <div><h3>${esc(m.name)}</h3><small>${esc(m.id)}</small></div>
            <div class="row">
              <button class="btn" onclick="openEditManager('${escJs(m.id)}')">Edit</button>
              <button class="btn danger" onclick="deleteManager('${escJs(m.id)}')">Delete</button>
            </div>
          </div>
          <div class="managerstats">
            <div><b>${Number(m.assignedCount || queue.length)}</b><span>Selected</span></div>
            <div><b>${Number(m.desiredCount || 0)}</b><span>Limit</span></div>
            <div><b>${m.isActive === false ? 'Off' : 'On'}</b><span>State</span></div>
          </div>
          <div class="queue">${items}</div>
        </div>`;
      }).join('');
    }

    function escJs(v){ return String(v).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    async function loadManagers(){
      const res = await api.managers();
      if (!res.ok) { toast('Managers', res.error); return false; }
      S.managers = Array.isArray(res.managers) ? res.managers : [];
      rebuildAssigned();
      renderManagerSelect();
      renderManagers();
      return true;
    }

    async function loadAccounts(agency){
      if (!agency) { S.accounts = []; renderAccounts(); return true; }
      const res = await api.accounts(agency);
      if (!res.ok) { toast('Accounts', res.error); return false; }
      S.accounts = Array.isArray(res.accounts) ? res.accounts : [];
      renderAccounts();
      return true;
    }

    async function refreshAll(){
      const ag = await api.agencies();
      if (!ag.ok) { toast('Agencies', ag.error); return; }
      S.agencies = Array.isArray(ag.agencies) ? ag.agencies : [];
      renderAgencies();
      await loadManagers();
      if (S.selectedAgency && S.agencies.some(a => a.agency === S.selectedAgency)) await loadAccounts(S.selectedAgency);
      else if (S.agencies[0]) { S.selectedAgency = S.agencies[0].agency; $('selAgency').value = S.selectedAgency; await loadAccounts(S.selectedAgency); }
      else { S.accounts = []; renderAccounts(); }
      persist();
    }

    async function doLogin(){
      const user = clean($('inUser').value), pass = clean($('inPass').value);
      if (!user || !pass) return toast('Login','Missing data');
      const res = await api.login(user, pass);
      if (!res.ok) return toast('Login', res.error || 'Failed');
      S.user = user; S.pass = pass; persist(); setAuth(true); await refreshAll(); toast('Login','Success');
    }

    function logout(){
      S.user=''; S.pass=''; S.agencies=[]; S.accounts=[]; S.managers=[]; S.selectedAgency=''; S.selectedManager=''; rebuildAssigned();
      sessionStorage.removeItem(STORE_KEY);
      $('inUser').value=''; $('inPass').value='';
      setAuth(false); renderAgencies(); renderManagerSelect(); renderAccounts(); renderManagers();
      $('selectedAgencyLabel').textContent='—';
    }

    function openSection(name){
      document.querySelectorAll('.nav .btn').forEach(b => b.classList.toggle('active', b.dataset.section === name));
      document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + name));
    }

    function openAccountModal(mode, a=null){
      S.accountMode = mode;
      S.editMatch = a ? { email:a.email, passport:a.passport } : null;
      $('accountModalTitle').textContent = mode === 'add' ? 'New Account' : 'Edit Account';
      $('accEmail').value = a?.email || '';
      $('accPassword').value = a?.password || '';
      $('accPassport').value = a?.passport || '';
      $('accStatus').value = a?.status || 'Pending';
      $('accountModal').classList.add('show');
    }
    function closeAccountModal(){ $('accountModal').classList.remove('show'); }
    function closeBulkModal(){ $('bulkModal').classList.remove('show'); }
    function openBulkModal(){ $('bulkText').value=''; $('bulkModal').classList.add('show'); }
    function openManagerModal(mode, m=null){
      S.managerMode = mode;
      $('managerModalTitle').textContent = mode === 'add' ? 'New Manager' : 'Edit Manager';
      $('mgrId').disabled = mode !== 'add';
      $('mgrId').value = m?.id || '';
      $('mgrName').value = m?.name || '';
      $('mgrLimit').value = m?.desiredCount || 8;
      $('mgrActive').value = String(m?.isActive !== false);
      $('managerModal').classList.add('show');
    }
    function closeManagerModal(){ $('managerModal').classList.remove('show'); }

    async function saveAccount(){
      if (!S.selectedAgency) return toast('Account','Select agency');
      const payload = { agency:S.selectedAgency, email:clean($('accEmail').value), password:clean($('accPassword').value), passport:clean($('accPassport').value), status:$('accStatus').value };
      const res = S.accountMode === 'add'
        ? await api.createAccount(payload)
        : await api.updateAccount({ ...payload, matchEmail:S.editMatch.email, matchPassport:S.editMatch.passport });
      if (!res.ok) return toast('Account', res.error || 'Failed');
      closeAccountModal();
      await refreshAll();
      toast('Account','Saved');
    }

    async function removeAccount(emailEnc, passportEnc){
      const email = decodeURIComponent(emailEnc), passport = decodeURIComponent(passportEnc);
      if (!confirm(email + '\n' + passport)) return;
      const res = await api.deleteAccount({ agency:S.selectedAgency, email, passport });
      if (!res.ok) return toast('Delete', res.error || 'Failed');
      await refreshAll();
      toast('Delete','Done');
    }

    function openEditAccount(emailEnc, passportEnc){
      const email = decodeURIComponent(emailEnc), passport = decodeURIComponent(passportEnc);
      const found = S.accounts.find(a => nEmail(a.email) === nEmail(email) && nPassport(a.passport) === nPassport(passport));
      if (!found) return;
      openAccountModal('edit', found);
    }

    async function bulkCheck(){
      if (!S.selectedAgency) return toast('Bulk','Select agency');
      const res = await api.bulkCheck(S.selectedAgency, $('bulkText').value);
      if (!res.ok) return toast('Bulk', res.error || 'Failed');
      toast('Bulk', `duplicates: ${Array.isArray(res.duplicates)?res.duplicates.length:0}\ninvalid: ${Array.isArray(res.invalid)?res.invalid.length:0}`);
    }

    async function bulkSave(){
      if (!S.selectedAgency) return toast('Bulk','Select agency');
      const res = await api.bulkSave(S.selectedAgency, $('bulkText').value);
      if (!res.ok) return toast('Bulk', res.error || 'Failed');
      closeBulkModal();
      await refreshAll();
      toast('Bulk', `added: ${res.added || 0}`);
    }

    async function sendAgencyTelegram(){
      if (!S.selectedAgency) return toast('Telegram','Select agency');
      const res = await api.sendAgency(S.selectedAgency);
      if (!res.ok) return toast('Telegram', res.error || 'Failed');
      toast('Telegram', `sent: ${res.count || 0}`);
    }

    async function saveManager(){
      const payload = { id:clean($('mgrId').value), name:clean($('mgrName').value), desiredCount:Number($('mgrLimit').value || 0), isActive:$('mgrActive').value === 'true' };
      const res = S.managerMode === 'add' ? await api.createManager(payload) : await api.updateManager(payload);
      if (!res.ok) return toast('Manager', res.error || 'Failed');
      closeManagerModal();
      await refreshAll();
      toast('Manager','Saved');
    }

    function openEditManager(id){
      const m = S.managers.find(x => x.id === id);
      if (!m) return;
      openManagerModal('edit', m);
    }

    async function deleteManager(id){
      if (!confirm(id)) return;
      const res = await api.deleteManager({ id });
      if (!res.ok) return toast('Manager', res.error || 'Failed');
      if (S.selectedManager === id) S.selectedManager = '';
      await refreshAll();
      toast('Manager','Deleted');
    }

    async function selectAccount(emailEnc, passportEnc){
      const id = clean($('selManager').value);
      if (!id) return toast('Select','Choose manager');
      const email = decodeURIComponent(emailEnc), passport = decodeURIComponent(passportEnc);
      const res = await api.managerSelect({ id, agency:S.selectedAgency, email, passport });
      if (!res.ok) return toast('Select', res.error || 'Failed');
      S.selectedManager = id; persist();
      await refreshAll();
      toast('Select','Done');
    }

    async function unselectAccount(emailEnc, passportEnc){
      const id = clean($('selManager').value);
      if (!id) return toast('Remove','Choose manager');
      const email = decodeURIComponent(emailEnc), passport = decodeURIComponent(passportEnc);
      const res = await api.managerUnselect({ id, agency:S.selectedAgency, email, passport });
      if (!res.ok) return toast('Remove', res.error || 'Failed');
      await refreshAll();
      toast('Remove','Done');
    }

    async function managerSetStatus(id, agency, emailEnc, passportEnc, status){
      const email = decodeURIComponent(emailEnc), passport = decodeURIComponent(passportEnc);
      const res = await api.managerStatus({ id, agency, email, passport, status });
      if (!res.ok) return toast('Status', res.error || 'Failed');
      if (S.selectedAgency === agency) await loadAccounts(agency);
      await loadManagers();
      renderAccounts();
      toast('Status', status);
    }

    document.querySelectorAll('.nav .btn').forEach(btn => btn.addEventListener('click', () => openSection(btn.dataset.section)));
    $('btnLogin').onclick = doLogin;
    $('btnLogout').onclick = logout;
    $('btnRefreshAll').onclick = refreshAll;
    $('btnPing').onclick = async () => { const r = await api.ping(); toast('Ping', r.ok ? 'OK' : (r.error || 'Failed')); };
    $('selAgency').onchange = async e => { S.selectedAgency = e.target.value; persist(); $('selectedAgencyLabel').textContent = S.selectedAgency || '—'; await loadAccounts(S.selectedAgency); renderAccounts(); };
    $('selManager').onchange = e => { S.selectedManager = e.target.value; persist(); renderAccounts(); };
    $('inSearch').oninput = renderAccounts;
    $('selStatus').onchange = renderAccounts;
    $('btnNewAccount').onclick = () => openAccountModal('add');
    $('btnSaveAccount').onclick = saveAccount;
    $('btnBulk').onclick = openBulkModal;
    $('btnBulkCheck').onclick = bulkCheck;
    $('btnBulkSave').onclick = bulkSave;
    $('btnSendAgency').onclick = sendAgencyTelegram;
    $('btnNewManager').onclick = () => openManagerModal('add');
    $('btnSaveManager').onclick = saveManager;
    $('apiHost').textContent = API_BASE;

    window.closeAccountModal = closeAccountModal;
    window.closeBulkModal = closeBulkModal;
    window.closeManagerModal = closeManagerModal;
    window.openEditAccount = openEditAccount;
    window.removeAccount = removeAccount;
    window.selectAccount = selectAccount;
    window.unselectAccount = unselectAccount;
    window.managerSetStatus = managerSetStatus;
    window.openEditManager = openEditManager;
    window.deleteManager = deleteManager;

    restore();
    setAuth(Boolean(S.user && S.pass));
    renderAgencies();
    renderManagerSelect();
    renderAccounts();
    renderManagers();
    if (S.user && S.pass) refreshAll();
  </script>
</body>
</html>

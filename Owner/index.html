<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Owner Panel</title>
<style>
:root{
  --bg:#f3f6fb;--card:#ffffff;--card2:#f8fbff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --primary:#2563eb;--primarySoft:#eff6ff;--success:#16a34a;--successSoft:#f0fdf4;--danger:#dc2626;--dangerSoft:#fef2f2;--warning:#d97706;--warningSoft:#fff7ed;
  --shadow:0 16px 40px rgba(15,23,42,.08);--radius:22px;--radiusSm:16px;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans Arabic","Noto Sans",sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:var(--sans);color:var(--text);background:
radial-gradient(circle at top right, rgba(37,99,235,.08), transparent 28%),
radial-gradient(circle at top left, rgba(14,165,233,.06), transparent 24%),
linear-gradient(180deg,#f8fbff 0%,#f2f5fa 100%)}
button,input,select,textarea{font:inherit}
.hidden{display:none!important}
.app{max-width:1500px;margin:0 auto;padding:24px}
.shell{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
@media (max-width:1150px){.shell{grid-template-columns:1fr}}
.card{background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow)}
.sidebar{position:sticky;top:20px;padding:18px}
@media (max-width:1150px){.sidebar{position:static}}
.brand{display:flex;align-items:center;gap:14px;padding:6px 2px 18px}
.logo{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,#0ea5e9,#2563eb 55%,#4338ca);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 16px 30px rgba(37,99,235,.22)}
.brand h1{margin:0;font-size:20px}
.brand p{margin:4px 0 0;color:var(--muted);font-size:12px}
.badgeRow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.chip,.pill,.tag{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}
.tag.good{background:#f0fdf4;color:#166534;border-color:#bbf7d0}.tag.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.tag.manager-appointment{background:#1e3a8a;color:#fff;border-color:#1e40af}.tag.type-appointment{background:#eff6ff;color:#1e3a8a;border-color:#93c5fd}.tag.type-waiting{background:#fff7ed;color:#9a3412;border-color:#fdba74}
.dot{width:9px;height:9px;border-radius:999px;background:#94a3b8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.label{display:block;margin:0 0 8px;font-size:12px;color:var(--muted)}
.field{margin-bottom:12px}
.input,select,textarea,input{width:100%;border:1px solid var(--line);background:#fff;padding:12px 14px;border-radius:16px;outline:none;color:var(--text);transition:.18s border,.18s box-shadow,.18s transform}
.input:focus,select:focus,textarea:focus,input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
textarea{min-height:180px;resize:vertical}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:11px 14px;border-radius:15px;font-weight:700;cursor:pointer;transition:.18s transform,.18s box-shadow,.18s border,.18s background;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(15,23,42,.06)}
.btn.primary{background:var(--primarySoft);border-color:#bfdbfe;color:#1d4ed8}
.btn.good{background:var(--successSoft);border-color:#bbf7d0;color:#15803d}
.btn.danger{background:var(--dangerSoft);border-color:#fecaca;color:#b91c1c}
.btn.warn{background:var(--warningSoft);border-color:#fed7aa;color:#b45309}
.btn[disabled]{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.sideActions{display:grid;gap:10px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
@media (max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{padding:18px;border-radius:20px;background:linear-gradient(180deg,#fff,#f9fbff);border:1px solid var(--line)}
.kpi b{display:block;font-size:28px;line-height:1;margin-bottom:8px}
.kpi span{font-size:13px;color:var(--muted)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;padding:18px}
@media (max-width:900px){.topbar{flex-direction:column;align-items:stretch}}
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.tabbtn{border:1px solid var(--line);background:#fff;color:var(--text);padding:11px 16px;border-radius:14px;font-weight:800;cursor:pointer}
.tabbtn.active{background:var(--primarySoft);border-color:#bfdbfe;color:#1d4ed8}
.panel{padding:18px}
.panelHead{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
@media (max-width:900px){.panelHead{flex-direction:column;align-items:stretch}}
.panelHead h2{margin:0;font-size:18px}
.panelHead .actions{justify-content:flex-end}
.filters{display:grid;grid-template-columns:1.05fr 1fr .75fr .9fr .9fr;gap:12px;margin-bottom:14px}
@media (max-width:1200px){.filters{grid-template-columns:1fr 1fr 1fr}} @media (max-width:850px){.filters{grid-template-columns:1fr 1fr}} @media (max-width:700px){.filters{grid-template-columns:1fr}}
.tablewrap{border:1px solid var(--line);border-radius:20px;overflow:auto;background:#fff}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:900px}
thead th{position:sticky;top:0;background:#f8fbff;color:var(--muted);font-size:12px;font-weight:800;text-align:right;padding:14px 12px;border-bottom:1px solid var(--line)}
tbody td{padding:13px 12px;border-bottom:1px solid #eef2f7;font-size:13px;vertical-align:middle;white-space:nowrap}
tbody tr:hover{background:#fbfdff}
.status{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid var(--line);background:#fff}
.s-good{background:#f0fdf4;color:#166534;border-color:#bbf7d0}.s-bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.s-neutral{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.s-warn{background:#fff7ed;color:#b45309;border-color:#fed7aa}
.sectionGrid{display:grid;grid-template-columns:1fr;gap:18px}
.stack{display:grid;gap:18px}
.subcard{padding:18px}
.subHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.subHead h3{margin:0;font-size:16px}
.empty{padding:26px 18px;text-align:center;color:var(--muted)}
.toast{position:fixed;left:20px;bottom:20px;max-width:360px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px;padding:14px 16px;display:none;z-index:60}
.toast.show{display:block}
.toast b{display:block;margin-bottom:5px}.toast span{color:var(--muted);font-size:13px;line-height:1.6;white-space:pre-wrap}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:20px;z-index:70}
.modal.show{display:flex}
.box{width:min(920px,100%);background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 20px 60px rgba(15,23,42,.22);overflow:hidden}
.modalHd,.modalFt{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line)}
.modalFt{border-bottom:none;border-top:1px solid var(--line);justify-content:flex-start;flex-wrap:wrap}
.modalBd{padding:20px}
.list{list-style:none;margin:0;padding:0;display:grid;gap:10px;max-height:320px;overflow:auto}
.list li{padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fbfdff}
.mono{font-family:var(--mono)}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <aside class="card sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Owner Panel</h1>
          <p id="apiHost">…</p>
        </div>
      </div>
      <div class="badgeRow">
        <span class="pill"><span class="dot"></span><span id="pillText">غير متصل</span></span>
        <span class="chip">Auth: <b id="authState">Guest</b></span>
      </div>
      <div class="field">
        <label class="label">User</label>
        <input id="inUser" placeholder="admin" />
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input id="inPass" type="password" placeholder="••••••••" />
      </div>
      <div class="field hidden" id="otpWrap">
        <label class="label">OTP</label>
        <input id="inOtp" inputmode="numeric" maxlength="6" placeholder="123456" />
      </div>
      <div class="sideActions">
        <button class="btn primary" id="btnLogin">Send OTP</button>
        <button class="btn primary hidden" id="btnVerifyOtp">Verify OTP</button>
        <div class="grid2">
          <button class="btn" id="btnPing">Ping</button>
          <button class="btn danger" id="btnLogout" disabled>Logout</button>
        </div>
      </div>
    </aside>

    <main>
      <div class="card topbar">
        <div class="tabs">
          <button class="tabbtn active" data-tab="accountsTab">الحسابات</button>
          <button class="tabbtn" data-tab="managersTab">المديرين</button>
        </div>
        <div class="actions">
          <button class="btn" id="btnRefresh" disabled>Refresh</button>
          <button class="btn" id="btnSendAgencyAll" disabled>Send Agency → Telegram</button>
        </div>
      </div>

      <section id="accountsTab" class="tabpane">
        <div class="card panel">
          <div class="panelHead">
            <div></div>
            <div class="actions">
              <button class="btn" id="btnBulk" disabled>Bulk Paste</button>
              <button class="btn primary" id="btnAddOne" disabled>Add Account</button>
            </div>
          </div>
          <div class="filters">
            <div>
              <label class="label">Agency</label>
              <select id="selAgency" disabled></select>
            </div>
            <div>
              <label class="label">Search</label>
              <input id="inSearch" placeholder="email / passport / status" disabled />
            </div>
            <div>
              <label class="label">Status</label>
              <select id="selStatusFilter" disabled>
                <option value="">All</option>
                <option value="Done">Done</option>
                <option value="In Progress">In Progress</option>
                <option value="Rejected">Rejected</option>
                <option value="Pending">Pending</option>
              </select>
            </div>
            <div>
              <label class="label">Manager</label>
              <select id="selManagerAssign" disabled></select>
            </div>
            <div>
              <label class="label">Month</label>
              <select id="selMonthFilter" disabled></select>
            </div>
          </div>
          <div class="tablewrap">
            <table>
              <thead>
                <tr><th>#</th><th>Agency</th><th>Email</th><th>Password</th><th>Passport</th><th>Status</th><th>Type</th><th>Manager</th><th>Actions</th></tr>
              </thead>
              <tbody id="tbody"><tr><td colspan="8" class="empty">—</td></tr></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="managersTab" class="tabpane hidden">
        <div class="sectionGrid">
          <div class="card subcard">
            <div class="subHead">
              <div></div>
              <button class="btn primary" id="btnOpenManager" disabled>Add Manager</button>
            </div>
            <div class="tablewrap">
              <table>
                <thead>
                  <tr><th>#</th><th>ID</th><th>Name</th><th>Limit</th><th>Selected</th><th>Actions</th></tr>
                </thead>
                <tbody id="managersTbody"><tr><td colspan="6" class="empty">—</td></tr></tbody>
              </table>
            </div>
          </div>
          <div class="card subcard">
            <div class="subHead">
              <div></div>
              <select id="selManagerView" disabled style="max-width:260px"></select>
            </div>
            <div class="tablewrap">
              <table>
                <thead>
                  <tr><th>#</th><th>Agency</th><th>Email</th><th>Passport</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="managerQueueTbody"><tr><td colspan="6" class="empty">—</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<div class="toast" id="toast"><b id="toastTitle">—</b><span id="toastMsg">—</span></div>

<div class="modal" id="modalOne">
  <div class="box">
    <div class="modalHd">
      <div><b id="oneTitle">Account</b><div id="oneSub" style="color:var(--muted);font-size:13px;margin-top:4px">—</div></div>
      <button class="btn" onclick="UI.closeOne()">✕</button>
    </div>
    <div class="modalBd">
      <div class="grid2">
        <div class="field"><label class="label">Email</label><input id="oneEmail" placeholder="name@example.com" /></div>
        <div class="field"><label class="label">Password</label><input id="onePass" placeholder="password" /></div>
      </div>
      <div class="grid2">
        <div class="field"><label class="label">Passport</label><input id="onePassport" placeholder="AA123456" /></div>
        <div class="field"><label class="label">Status</label><select id="oneStatus"><option>Done</option><option>In Progress</option><option>Rejected</option><option selected>Pending</option></select></div>
        <div class="field"><label class="label">Type</label><select id="oneType"><option value="">—</option><option>Appointment</option><option>Waiting list</option></select></div>
      </div>
    </div>
    <div class="modalFt">
      <button class="btn" onclick="UI.closeOne()">Cancel</button>
      <button class="btn primary" id="btnSaveOne">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="modalBulk">
  <div class="box">
    <div class="modalHd">
      <div><b>Bulk Paste</b></div>
      <button class="btn" onclick="UI.closeBulk()">✕</button>
    </div>
    <div class="modalBd">
      <div class="sectionGrid">
        <div class="field"><label class="label">JSON</label><textarea id="bulkText" class="mono" placeholder='[{"email":"a@x.com","password":"123","passport":"AA1","status":"Pending","type":"Appointment"}]'></textarea></div>
        <div class="stack">
          <div class="card" style="padding:16px;background:#fbfdff;border-radius:18px;border:1px solid var(--line)"><div class="mono" id="bulkStats">—</div></div>
          <ul class="list" id="bulkList"></ul>
        </div>
      </div>
    </div>
    <div class="modalFt">
      <button class="btn" onclick="UI.closeBulk()">Cancel</button>
      <button class="btn" id="btnParse">Preview</button>
      <button class="btn primary" id="btnBulkAdd" disabled>Add</button>
    </div>
  </div>
</div>

<div class="modal" id="modalManager">
  <div class="box" style="width:min(620px,100%)">
    <div class="modalHd">
      <div><b id="managerTitle">Manager</b></div>
      <button class="btn" onclick="UI.closeManager()">✕</button>
    </div>
    <div class="modalBd">
      <div class="grid2">
        <div class="field"><label class="label">ID</label><input id="mgrId" placeholder="manager-1" /></div>
        <div class="field"><label class="label">Name</label><input id="mgrName" placeholder="Manager" /></div>
      </div>
      <div class="field"><label class="label">Limit</label><input id="mgrDesired" type="number" min="1" max="200" value="8" /></div>
    </div>
    <div class="modalFt">
      <button class="btn" onclick="UI.closeManager()">Cancel</button>
      <button class="btn primary" id="btnSaveManager">Save</button>
    </div>
  </div>
</div>
<script>
(() => {
  const API_BASE = (document.body?.dataset?.apiBase || "https://api.mehdik.site").replace(/\/$/, "");
  const OWNER_BASE = API_BASE + "/owner";
  document.getElementById("apiHost").textContent = API_BASE;
  const STORAGE_KEY = "owner-panel-safe-ui:v2";
  const VALID_STATUSES = ["Done","In Progress","Rejected","Pending"];
  const STATUS_PRIORITY = {"Done":0,"In Progress":1,"Rejected":2,"Pending":3};
  const S = { authenticated:false, csrfToken:"", pendingChallengeId:"", loginUser:"", agencies:[], agencySelected:"", accounts:[], managers:[], managerSelected:"", managerAssignSelected:"", monthSelected:"", bulkParsed:[] };

  const $ = (id) => document.getElementById(id);
  const norm = (s) => String(s || "").trim();
  const normEmail = (s) => norm(s).toLowerCase();
  const normPassport = (s) => norm(s).toUpperCase();
  const statusValue = (s) => VALID_STATUSES.includes(norm(s)) ? norm(s) : "Pending";
  const typeValue = (t) => { const v = norm(t).toLowerCase(); if(v === "appointment") return "Appointment"; if(v === "waiting list" || v === "waitinglist") return "Waiting list"; return ""; };
  const escapeHtml = (x) => String(x ?? "").replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const isValidEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(normEmail(email));
  const isValidPassport = (passport) => /^[A-Z0-9][A-Z0-9\-]{2,19}$/.test(normPassport(passport));
  const statusClass = (st) => st === "Done" ? "s-good" : st === "Rejected" ? "s-bad" : st === "In Progress" ? "s-neutral" : "s-warn";

const maskPassword = (p) => { const s=String(p||""); if(!s) return ""; if(s.length<=2) return "•".repeat(s.length); return "•".repeat(Math.min(10, Math.max(1,s.length-2))) + s.slice(-2); };

function toast(title, msg){ const t=$("toast"); $("toastTitle").textContent=title; $("toastMsg").textContent=msg; t.classList.add("show"); clearTimeout(toast._tm); toast._tm=setTimeout(()=>t.classList.remove("show"), 3500); }
function persistUiState(){ sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ agencySelected:S.agencySelected, managerSelected:S.managerSelected, managerAssignSelected:S.managerAssignSelected, monthSelected:S.monthSelected, loginUser:S.loginUser })); }
function restoreUiState(){ try { const raw=sessionStorage.getItem(STORAGE_KEY); if(!raw) return; const d=JSON.parse(raw); S.agencySelected=norm(d.agencySelected); S.managerSelected=norm(d.managerSelected); S.managerAssignSelected=norm(d.managerAssignSelected); S.monthSelected=norm(d.monthSelected); S.loginUser=norm(d.loginUser); $("inUser").value=S.loginUser; } catch(_){} }
function resetLoginFlow(clearCreds=false){
  S.pendingChallengeId="";
  $("otpWrap").classList.add("hidden");
  $("btnVerifyOtp").classList.add("hidden");
  $("btnLogin").classList.remove("hidden");
  $("btnLogin").textContent="Send OTP";
  $("inOtp").value="";
  if(clearCreds){ $("inPass").value=""; }
}
function setAuthState(authed){
  S.authenticated = !!authed;
  $("authState").textContent = authed ? "Owner" : "Guest";
  $("btnLogout").disabled=!authed;
  ["btnRefresh","btnBulk","btnAddOne","selAgency","inSearch","selStatusFilter","btnSendAgencyAll","btnOpenManager","selManagerView","selManagerAssign","selMonthFilter"].forEach(id=>$(id).disabled=!authed);
  $("pillText").textContent = authed ? "متصل" : "غير متصل";
  if(authed){
    $("btnLogin").classList.add("hidden");
    $("btnVerifyOtp").classList.add("hidden");
    $("otpWrap").classList.add("hidden");
    $("inPass").disabled = true;
    $("inUser").disabled = true;
  }else{
    $("btnLogin").classList.remove("hidden");
    $("btnLogin").textContent = "Send OTP";
    $("btnVerifyOtp").classList.add("hidden");
    $("otpWrap").classList.add("hidden");
    $("inPass").disabled = false;
    $("inUser").disabled = false;
  }
}


async function apiFetch(url, options={}){
  const controller = new AbortController(); const timer = setTimeout(()=>controller.abort(), 15000);
  try{
    const headers = new Headers(options.headers || {});
    const method = String(options.method || "GET").toUpperCase();
    if(!["GET","HEAD","OPTIONS"].includes(method) && S.csrfToken){
      headers.set("X-CSRF-Token", S.csrfToken);
    }
    const response = await fetch(url, { ...options, headers, credentials:"include", signal:controller.signal });
    const data = await response.json().catch(()=>({ ok:false, error:"Invalid server response" }));
    if(!response.ok && data && typeof data.ok === "undefined") data.ok = false;
    return data;
  }catch(err){ return { ok:false, error: err?.name === "AbortError" ? "Request timeout" : (err?.message || "Request failed") }; }
  finally{ clearTimeout(timer); }
}

const API = {
    ping:()=>apiFetch(OWNER_BASE+"/ping"),
    startAuth:(user,pass)=>apiFetch(OWNER_BASE+"/auth/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user,pass})}),
    verifyOtp:(challengeId,otp)=>apiFetch(OWNER_BASE+"/auth/verify",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({challengeId,otp})}),
    session:()=>apiFetch(OWNER_BASE+"/session"),
    logout:()=>apiFetch(OWNER_BASE+"/logout",{method:"POST"}),
    agencies:()=>apiFetch(OWNER_BASE+"/agencies"),
    accounts:(agency)=>apiFetch(OWNER_BASE+"/accounts?agency="+encodeURIComponent(agency)),
    addAccount:(payload)=>apiFetch(OWNER_BASE+"/account",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    editAccount:(payload)=>apiFetch(OWNER_BASE+"/account",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    delAccount:(payload)=>apiFetch(OWNER_BASE+"/account",{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    sendAgencyAll:(agency)=>apiFetch(OWNER_BASE+"/agency/send-all",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({agency})}),
    managers:()=>apiFetch(OWNER_BASE+"/managers"),
    createManager:(payload)=>apiFetch(OWNER_BASE+"/manager",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    editManager:(payload)=>apiFetch(OWNER_BASE+"/manager",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    deleteManager:(payload)=>apiFetch(OWNER_BASE+"/manager",{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    managerSelect:(payload)=>apiFetch(OWNER_BASE+"/manager/select",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    managerUnselect:(payload)=>apiFetch(OWNER_BASE+"/manager/unselect",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),
    managerStatus:(payload)=>apiFetch(OWNER_BASE+"/manager/status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
  };


  function monthKeyFromDate(value){
    const d = new Date(value || "");
    if(Number.isNaN(d.getTime())) return "";
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }

  function currentMonthKey(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  }

  function monthLabel(key){
    if(!key) return "Month";
    const [y,m] = String(key).split("-");
    const d = new Date(Number(y), Number(m)-1, 1);
    if(Number.isNaN(d.getTime())) return key;
    return d.toLocaleDateString("en-CA",{year:"numeric",month:"long"});
  }

  function accountDoneMonths(a){
    const months = new Set();
    const createdMonth = monthKeyFromDate(a.createdAt);
    const doneMonth = monthKeyFromDate(a.doneAt || a.statusChangedAt || a.updatedAt);
    if(createdMonth) months.add(createdMonth);
    if(doneMonth) months.add(doneMonth);
    return [...months];
  }

  function populateMonthFilter(list){
    const sel = $("selMonthFilter");
    const current = currentMonthKey();
    const months = new Set([current]);
    for(const a of (Array.isArray(list)?list:[])){
      if(statusValue(a.status)==="Done"){
        for(const key of accountDoneMonths(a)) if(key) months.add(key);
      }
    }
    const ordered = [...months].sort((a,b)=> a < b ? 1 : -1);
    if(!S.monthSelected || !months.has(S.monthSelected)) S.monthSelected = current;
    sel.innerHTML = ordered.map(key=>`<option value="${escapeHtml(key)}">${escapeHtml(monthLabel(key))}</option>`).join("");
    sel.value = S.monthSelected;
  }

  function applyFilters(list){
    const q = norm($("inSearch").value).toLowerCase();
    const sf = norm($("selStatusFilter").value);
    const selectedMonth = norm($("selMonthFilter").value) || S.monthSelected || currentMonthKey();
    S.monthSelected = selectedMonth;
    return (Array.isArray(list)?list:[]).filter(a => {
      const status = statusValue(a.status);
      const okQ = !q || [a.agency,a.email,a.passport,a.status,a.type].join(" ").toLowerCase().includes(q);
      const okS = !sf || status === sf;
      const okM = status !== "Done" || accountDoneMonths(a).includes(selectedMonth);
      return okQ && okS && okM;
    }).sort((a,b)=> (STATUS_PRIORITY[statusValue(a.status)]-STATUS_PRIORITY[statusValue(b.status)]) || String(a.email).localeCompare(String(b.email)));
  }

  function managerByAccount(agency,email,passport){
    for(const m of S.managers){
      if((m.queue||[]).some(a => norm(a.agency).toLowerCase()===norm(agency).toLowerCase() && normEmail(a.email)===normEmail(email) && normPassport(a.passport)===normPassport(passport))) return m;
    }
    return null;
  }

  function renderAgencies(){
    const sel = $("selAgency"); sel.innerHTML = '<option value="">(اختر وكالة)</option>';
    for(const a of S.agencies){ const o=document.createElement('option'); o.value=a.agency; o.textContent=`${a.agency} (${a.count||0})`; sel.appendChild(o); }
    if(S.agencySelected) sel.value = S.agencySelected;
  }

  function renderManagersSelectors(){
    for(const id of ["selManagerView","selManagerAssign"]){
      const sel=$(id); sel.innerHTML='<option value="">(اختر مدير)</option>';
      for(const m of S.managers){ const o=document.createElement('option'); o.value=m.id; o.textContent=`${m.name} (${m.assignedCount||0}/${m.desiredCount})`; sel.appendChild(o); }
    }
    if(S.managerSelected) $("selManagerView").value=S.managerSelected;
    if(S.managerAssignSelected) $("selManagerAssign").value=S.managerAssignSelected;
  }

  function renderManagers(){
    renderManagersSelectors();
    const tb=$("managersTbody");
    if(!S.managers.length){ tb.innerHTML='<tr><td colspan="6" class="muted" style="padding:16px">—</td></tr>'; renderManagerQueue(); return; }
    tb.innerHTML=S.managers.map((m,i)=>`<tr>
      <td>${i+1}</td>
      <td class="mono">${escapeHtml(m.id)}</td>
      <td>${escapeHtml(m.name)}</td>
      <td>${m.desiredCount}</td>
      <td>${m.assignedCount||0}</td>
      <td><div class="row">
        <button class="btn" onclick="UI.editManager('${encodeURIComponent(m.id)}')">Edit</button>
        <button class="btn danger" onclick="UI.deleteManager('${encodeURIComponent(m.id)}')">Delete</button>
      </div></td>
    </tr>`).join("");
    renderManagerQueue();
  }

  function renderAccounts(){
    const tb=$("tbody");
    populateMonthFilter(S.accounts);
    if(!S.agencySelected){ tb.innerHTML='<tr><td colspan="9" class="muted" style="padding:16px">اختر وكالة أولاً</td></tr>'; return; }
    const filtered=applyFilters(S.accounts);
    if(!filtered.length){ tb.innerHTML='<tr><td colspan="9" class="muted" style="padding:16px">لا توجد بيانات</td></tr>'; return; }
    const selectedManagerId = S.managerAssignSelected;
    tb.innerHTML=filtered.map((a,i)=>{
      const assigned = managerByAccount(a.agency||S.agencySelected,a.email,a.passport);
      const accountType = typeValue(a.type);
      const typeBadge = accountType ? `<span class="tag ${accountType==='Appointment' ? 'type-appointment' : 'type-waiting'}">${escapeHtml(accountType)}</span>` : '<span class="muted">—</span>';
      const assignedBadge = assigned ? `<span class="tag ${accountType==='Appointment' ? 'manager-appointment' : 'good'}">${escapeHtml(assigned.name)}</span>` : '<span class="muted">—</span>'; 
      let managerAction = '<span class="muted">اختر مديراً</span>';
      if(assigned){
        if(assigned.id===selectedManagerId){
          managerAction = `<button class="btn danger" onclick="UI.managerUnselect('${encodeURIComponent(assigned.id)}','${encodeURIComponent(a.agency||S.agencySelected)}','${encodeURIComponent(a.email||"")}','${encodeURIComponent(a.passport||"")}')">Remove</button>`;
        }else{
          managerAction = `<span class="tag bad">محجوز لمدير آخر</span>`;
        }
      }else if(selectedManagerId){
        const st=statusValue(a.status);
        if(st==="Done"||st==="Rejected") managerAction = `<span class="tag bad">غير قابل للاختيار</span>`;
        else managerAction = `<button class="btn good" onclick="UI.managerSelect('${encodeURIComponent(selectedManagerId)}','${encodeURIComponent(a.agency||S.agencySelected)}','${encodeURIComponent(a.email||"")}','${encodeURIComponent(a.passport||"")}')">Select</button>`;
      }
      return `<tr>
        <td class="mono">${i+1}</td>
        <td class="mono">${escapeHtml(a.agency||S.agencySelected)}</td>
        <td class="mono">${escapeHtml(a.email||"")}</td>
        <td class="mono">${escapeHtml(maskPassword(a.password||""))}</td>
        <td class="mono">${escapeHtml(a.passport||"")}</td>
        <td><span class="status ${statusClass(statusValue(a.status))}"><span class="dot"></span>${escapeHtml(statusValue(a.status))}</span></td>
        <td>${typeBadge}</td>
        <td>${assignedBadge}</td>
        <td><div class="row">
          <button class="btn" onclick="UI.openEdit('${encodeURIComponent(a.email||"")}','${encodeURIComponent(a.passport||"")}')">Edit</button>
          <button class="btn danger" onclick="UI.del('${encodeURIComponent(a.email||"")}','${encodeURIComponent(a.passport||"")}')">Delete</button>
          ${managerAction}
        </div></td>
      </tr>`;
    }).join("");
  }

  function renderManagerQueue(){
    const tb=$("managerQueueTbody");
    const manager=S.managers.find(m=>m.id===S.managerSelected);
    if(!manager){ tb.innerHTML='<tr><td colspan="6" class="muted" style="padding:16px">اختر مديراً</td></tr>'; return; }
    const queue=(manager.queue||[]).slice().sort((a,b)=> (STATUS_PRIORITY[statusValue(a.status)]-STATUS_PRIORITY[statusValue(b.status)]) || String(a.agency).localeCompare(String(b.agency)));
    if(!queue.length){ tb.innerHTML='<tr><td colspan="6" class="muted" style="padding:16px">لا توجد حسابات مختارة</td></tr>'; return; }
    tb.innerHTML=queue.map((a,i)=>`<tr>
      <td>${i+1}</td>
      <td class="mono">${escapeHtml(a.agency||"")}</td>
      <td class="mono">${escapeHtml(a.email||"")}</td>
      <td class="mono">${escapeHtml(a.passport||"")}</td>
      <td><span class="status ${statusClass(statusValue(a.status))}"><span class="dot"></span>${escapeHtml(statusValue(a.status))}</span></td>
      <td><div class="row">
        <button class="btn" onclick="UI.managerSetStatus('${encodeURIComponent(manager.id)}','${encodeURIComponent(a.agency)}','${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}','In Progress')">In Progress</button>
        <button class="btn warn" onclick="UI.managerSetStatus('${encodeURIComponent(manager.id)}','${encodeURIComponent(a.agency)}','${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}','Pending')">Pending</button>
        <button class="btn good" onclick="UI.managerSetStatus('${encodeURIComponent(manager.id)}','${encodeURIComponent(a.agency)}','${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}','Done')">Done</button>
        <button class="btn danger" onclick="UI.managerSetStatus('${encodeURIComponent(manager.id)}','${encodeURIComponent(a.agency)}','${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}','Rejected')">Rejected</button>
        <button class="btn danger" onclick="UI.managerUnselect('${encodeURIComponent(manager.id)}','${encodeURIComponent(a.agency)}','${encodeURIComponent(a.email)}','${encodeURIComponent(a.passport)}')">Remove</button>
      </div></td>
    </tr>`).join('');
  }

  const UI = {
    _oneMode:"add", _oneMatch:{email:"",passport:""}, _mgrMode:"add",
    async logout(){
      await API.logout();
      S.csrfToken=""; S.pendingChallengeId=""; S.loginUser=norm($("inUser").value); S.agencies=[]; S.accounts=[]; S.managers=[]; S.agencySelected=""; S.managerSelected=""; S.managerAssignSelected=""; S.monthSelected=currentMonthKey();
      sessionStorage.removeItem(STORAGE_KEY);
      setAuthState(false); resetLoginFlow(true); renderAgencies(); renderAccounts(); renderManagers(); toast('Logout','Logged out');
    },
    async beginLogin(){
      const user=norm($("inUser").value), pass=norm($("inPass").value);
      if(!user || !pass) return toast('Login','أدخل بيانات الدخول');
      const res=await API.startAuth(user,pass);
      if(!res.ok) return toast('Login',res.error||'Unauthorized');
      S.pendingChallengeId = norm(res.challengeId);
      S.loginUser = user;
      persistUiState();
      $("otpWrap").classList.remove("hidden");
      $("btnVerifyOtp").classList.remove("hidden");
      $("btnLogin").classList.add("hidden");
      $("inOtp").focus();
      toast('OTP','تم إرسال الرمز إلى تيليغرام');
    },
    async verifyOtp(){
      const otp=norm($("inOtp").value);
      if(!S.pendingChallengeId) return toast('OTP','ابدأ تسجيل الدخول أولاً');
      if(!/^\d{6}$/.test(otp)) return toast('OTP','الرمز يجب أن يكون 6 أرقام');
      const res=await API.verifyOtp(S.pendingChallengeId, otp);
      if(!res.ok) return toast('OTP',res.error||'OTP غير صحيح');
      S.csrfToken = norm(res.csrfToken);
      S.monthSelected = currentMonthKey();
      setAuthState(true);
      resetLoginFlow(true);
      await UI.refreshAll();
      toast('Login','تم تسجيل الدخول');
    },
    async restoreAuth(){
      const res=await API.session();
      if(!res.ok || !res.authenticated){
        setAuthState(false);
        return;
      }
      S.csrfToken = norm(res.csrfToken);
      S.loginUser = norm(res.user);
      $("inUser").value = S.loginUser;
      setAuthState(true);
      await UI.refreshAll();
    },
    async refreshAll(){
      const res=await API.agencies(); if(!res.ok) return toast('Agencies',res.error||'Failed');
      S.agencies=Array.isArray(res.agencies)?res.agencies:[];
      renderAgencies(); renderManagers();
      if(S.agencySelected) await UI.loadAgency(S.agencySelected); else { S.accounts=[]; renderAccounts(); }
      persistUiState();
    },
    async loadAgency(agency){
      S.agencySelected=agency||''; persistUiState(); renderAgencies();
      if(!S.agencySelected){ S.accounts=[]; renderAccounts(); return; }
      const res=await API.accounts(S.agencySelected); if(!res.ok) return toast('Accounts',res.error||'Failed');
      S.accounts=Array.isArray(res.accounts)?res.accounts:[];
      renderAccounts();
    },
    async loadManagers(){
      const res=await API.managers(); if(!res.ok) return toast('Managers',res.error||'Failed');
      S.managers=Array.isArray(res.managers)?res.managers:[];
      renderManagers(); renderAccounts(); persistUiState();
    },
    openAddOne(){ if(!S.agencySelected) return toast('Account','اختر وكالة أولاً'); UI._oneMode="add"; UI._oneMatch={email:"",passport:""}; $("oneTitle").textContent='Add Account'; $("oneSub").textContent=S.agencySelected; $("oneEmail").value=''; $("onePass").value=''; $("onePassport").value=''; $("oneStatus").value='Pending'; $("oneType").value=''; $("modalOne").classList.add('show'); },
    openEdit(emailEnc, passportEnc){
      const email=decodeURIComponent(emailEnc||''), passport=decodeURIComponent(passportEnc||'');
      const a=S.accounts.find(x=>normEmail(x.email)===normEmail(email)&&normPassport(x.passport)===normPassport(passport)); if(!a) return;
      UI._oneMode="edit"; UI._oneMatch={email:a.email,passport:a.passport}; $("oneTitle").textContent='Edit Account'; $("oneSub").textContent=S.agencySelected; $("oneEmail").value=a.email||''; $("onePass").value=a.password||''; $("onePassport").value=a.passport||''; $("oneStatus").value=statusValue(a.status); $("oneType").value=typeValue(a.type); $("modalOne").classList.add('show');
    },
    closeOne(){ $("modalOne").classList.remove('show'); },
    async saveOne(){
      if(!S.agencySelected) return toast('Account','اختر وكالة أولاً');
      const payload={agency:S.agencySelected,email:norm($("oneEmail").value),password:norm($("onePass").value),passport:norm($("onePassport").value),status:$("oneStatus").value,type:typeValue($("oneType").value)};
      if(!isValidEmail(payload.email)) return toast('Account','Email غير صالح');
      if(!isValidPassport(payload.passport)) return toast('Account','Passport غير صالح');
      let res;
      if(UI._oneMode==="add") res=await API.addAccount(payload);
      else res=await API.editAccount({...payload,matchEmail:UI._oneMatch.email,matchPassport:UI._oneMatch.passport});
      if(!res.ok) return toast('Account',res.error||'Failed');
      UI.closeOne(); await UI.refreshAll(); await UI.loadAgency(S.agencySelected); toast('Account','تم الحفظ');
    },
    async del(emailEnc, passportEnc){
      if(!S.agencySelected) return;
      const email=decodeURIComponent(emailEnc||''), passport=decodeURIComponent(passportEnc||'');
      if(!confirm(`Delete ${email}?`)) return;
      const res=await API.delAccount({agency:S.agencySelected,email,passport}); if(!res.ok) return toast('Delete',res.error||'Failed');
      await UI.refreshAll(); await UI.loadAgency(S.agencySelected); toast('Delete','تم الحذف');
    },
    openBulk(){ if(!S.agencySelected) return toast('Bulk','اختر وكالة أولاً'); $("bulkText").value=''; $("bulkStats").textContent='—'; $("bulkList").innerHTML=''; $("btnBulkAdd").disabled=true; S.bulkParsed=[]; $("modalBulk").classList.add('show'); },
    closeBulk(){ $("modalBulk").classList.remove('show'); },
    parseBulk(){
      let arr=[]; try{ arr=JSON.parse($("bulkText").value||'[]'); }catch(_){ return toast('Bulk','JSON غير صالح'); }
      if(!Array.isArray(arr)) return toast('Bulk','JSON يجب أن يكون Array');
      const parsed=[], bad=[];
      for(const item of arr){
        const a={ email:norm(item.email), password:norm(item.password), passport:norm(item.passport), status:statusValue(item.status), type:typeValue(item.type) };
        if(!isValidEmail(a.email)||!isValidPassport(a.passport)||!a.password) { bad.push(JSON.stringify(item)); continue; }
        parsed.push(a);
      }
      S.bulkParsed=parsed; $("bulkStats").textContent=`Valid: ${parsed.length}\nInvalid: ${bad.length}`; $("bulkList").innerHTML=parsed.slice(0,50).map(a=>`<li>${escapeHtml(a.email)} — ${escapeHtml(a.passport)} — ${escapeHtml(a.status)}${a.type?` — ${escapeHtml(a.type)}`:""}</li>`).join(''); $("btnBulkAdd").disabled=!parsed.length;
    },
    async bulkAdd(){
      let ok=0, fail=0;
      for(const item of S.bulkParsed){ const res=await API.addAccount({agency:S.agencySelected,...item}); if(res.ok) ok++; else fail++; }
      await UI.loadAgency(S.agencySelected); await UI.refreshAll(); toast('Bulk',`Added: ${ok} | Failed: ${fail}`); UI.closeBulk();
    },
    async sendAgencyAll(){
      if(!S.agencySelected) return toast('Telegram','اختر وكالة أولاً');
      const res=await API.sendAgencyAll(S.agencySelected); if(!res.ok) return toast('Telegram',res.error||'Failed');
      toast('Telegram',`تم الإرسال: ${res.count||0} حساب`);
    },
    openManager(){ UI._mgrMode='add'; $("managerTitle").textContent='مدير جديد'; $("mgrId").disabled=false; $("mgrId").value=''; $("mgrName").value=''; $("mgrDesired").value='8'; $("modalManager").classList.add('show'); },
    editManager(idEnc){ const id=decodeURIComponent(idEnc||''); const m=S.managers.find(x=>x.id===id); if(!m) return; UI._mgrMode='edit'; $("managerTitle").textContent='تعديل مدير'; $("mgrId").disabled=true; $("mgrId").value=m.id; $("mgrName").value=m.name||''; $("mgrDesired").value=m.desiredCount||8; $("modalManager").classList.add('show'); },
    closeManager(){ $("modalManager").classList.remove('show'); },
    async saveManager(){
      const payload={id:norm($("mgrId").value),name:norm($("mgrName").value),desiredCount:Number($("mgrDesired").value||8)};
      if(!payload.id) return toast('Manager','ID مطلوب');
      let res = UI._mgrMode==='add' ? await API.createManager(payload) : await API.editManager(payload);
      if(!res.ok) return toast('Manager',res.error||'Failed');
      UI.closeManager(); await UI.loadManagers(); toast('Manager','تم الحفظ');
    },
    async deleteManager(idEnc){
      const id=decodeURIComponent(idEnc||''); if(!confirm(`Delete manager ${id}?`)) return;
      const res=await API.deleteManager({id}); if(!res.ok) return toast('Manager',res.error||'Failed');
      if(S.managerSelected===id) S.managerSelected=''; if(S.managerAssignSelected===id) S.managerAssignSelected='';
      await UI.loadManagers(); renderAccounts(); toast('Manager','تم الحذف');
    },
    async managerSelect(idEnc, agencyEnc, emailEnc, passportEnc){
      const id=decodeURIComponent(idEnc||''), agency=decodeURIComponent(agencyEnc||''), email=decodeURIComponent(emailEnc||''), passport=decodeURIComponent(passportEnc||'');
      const res=await API.managerSelect({id,agency,email,passport}); if(!res.ok) return toast('Manager',res.error||'Failed');
      S.managerSelected=id; await UI.loadManagers(); if(S.agencySelected===agency) await UI.loadAgency(agency); toast('Manager','تمت إضافة الحساب لقائمة المدير');
    },
    async managerUnselect(idEnc, agencyEnc, emailEnc, passportEnc){
      const id=decodeURIComponent(idEnc||''), agency=decodeURIComponent(agencyEnc||''), email=decodeURIComponent(emailEnc||''), passport=decodeURIComponent(passportEnc||'');
      const res=await API.managerUnselect({id,agency,email,passport}); if(!res.ok) return toast('Manager',res.error||'Failed');
      await UI.loadManagers(); if(S.agencySelected===agency) await UI.loadAgency(agency); S.managerSelected=id; toast('Manager','تم حذف الحساب من قائمة المدير');
    },
    async managerSetStatus(idEnc, agencyEnc, emailEnc, passportEnc, status){
      const id=decodeURIComponent(idEnc||''), agency=decodeURIComponent(agencyEnc||''), email=decodeURIComponent(emailEnc||''), passport=decodeURIComponent(passportEnc||'');
      const res=await API.managerStatus({id,agency,email,passport,status}); if(!res.ok) return toast('Status',res.error||'Failed');
      await UI.loadManagers(); if(S.agencySelected===agency) await UI.loadAgency(agency); S.managerSelected=id; renderManagers();
      toast('Status', (status==='Done'||status==='Rejected') ? `تم وضع ${status} وحذف الحساب من قائمة المدير` : `تم وضع ${status}`);
    }
  };

  window.UI = UI;
  $("btnLogin").onclick=UI.beginLogin; $("btnVerifyOtp").onclick=UI.verifyOtp; $("btnLogout").onclick=UI.logout; $("btnPing").onclick=async()=>{ const r=await API.ping(); toast('Ping',r.ok?'OK':(r.error||'Failed')); };
  $("inOtp").addEventListener('keydown', (e)=>{ if(e.key==="Enter") UI.verifyOtp(); });
  $("inPass").addEventListener('keydown', (e)=>{ if(e.key==="Enter") UI.beginLogin(); });
  $("btnRefresh").onclick=UI.refreshAll; $("btnBulk").onclick=UI.openBulk; $("btnAddOne").onclick=UI.openAddOne; $("btnParse").onclick=UI.parseBulk; $("btnBulkAdd").onclick=UI.bulkAdd; $("btnSaveOne").onclick=UI.saveOne; $("btnSendAgencyAll").onclick=UI.sendAgencyAll; $("btnOpenManager").onclick=UI.openManager; $("btnSaveManager").onclick=UI.saveManager;
  $("selAgency").addEventListener('change', (e)=>UI.loadAgency(e.target.value||'')); $("inSearch").addEventListener('input', renderAccounts); $("selStatusFilter").addEventListener('change', renderAccounts);
  $("selManagerView").addEventListener('change', (e)=>{ S.managerSelected=e.target.value||''; persistUiState(); renderManagerQueue(); });
  $("selManagerAssign").addEventListener('change', (e)=>{ S.managerAssignSelected=e.target.value||''; persistUiState(); renderAccounts(); });
  $("selMonthFilter").addEventListener('change', (e)=>{ S.monthSelected=e.target.value||currentMonthKey(); persistUiState(); renderAccounts(); });
  document.querySelectorAll('.tabbtn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tabpane').forEach(p=>p.classList.add('hidden')); document.getElementById(btn.dataset.tab).classList.remove('hidden'); }));

  restoreUiState(); setAuthState(false); resetLoginFlow(false); UI.restoreAuth().catch(()=>{});
})();
</script>

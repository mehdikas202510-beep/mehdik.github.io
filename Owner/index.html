<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Owner Panel - Agencies</title>
  <style>
    :root{--b:#0b1220;--c:#111a2e;--t:#eaf0ff;--m:#9fb0d9;--a:#5b8cff;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;}
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{margin:0;background:linear-gradient(120deg,var(--b),#060a14);color:var(--t)}
    .wrap{max-width:1100px;margin:0 auto;padding:22px}
    .card{background:rgba(17,26,46,.85);border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    .row{display:flex;gap:14px;flex-wrap:wrap}
    .p{padding:18px}
    h1{margin:0 0 10px;font-size:22px}
    h2{margin:0 0 12px;font-size:18px;color:var(--m)}
    label{display:block;margin:10px 0 6px;color:var(--m);font-size:13px}
    input,select,button{width:100%;padding:12px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.18);color:var(--t);outline:none}
    input:focus,select:focus{border-color:rgba(91,140,255,.7)}
    button{cursor:pointer;background:linear-gradient(135deg,var(--a),#3a6bff);border:none;font-weight:700}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,.18)}
    button.danger{background:linear-gradient(135deg,var(--danger),#b91c1c)}
    button.small{padding:9px 10px;border-radius:10px;font-size:12px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .muted{color:var(--m);font-size:13px}
    .tag{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.12);font-size:12px}
    .tag.ok{border-color:rgba(34,197,94,.35);color:#bbf7d0}
    .tag.pending{border-color:rgba(245,158,11,.35);color:#fde68a}
    table{width:100%;border-collapse:separate;border-spacing:0 10px}
    th{font-size:12px;color:var(--m);text-align:right;padding:0 10px}
    td{padding:12px 10px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08)}
    tr td:first-child{border-radius:12px 0 0 12px}
    tr td:last-child{border-radius:0 12px 12px 0}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:900px){.grid2{grid-template-columns:1fr}}
    .modal{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.55);padding:18px}
    .modal .box{width:min(560px,100%);background:rgba(17,26,46,.95);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px}
    .modal.open{display:grid}
    .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
    .hint{font-size:12px;color:var(--m);margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>لوحة Owner لإدارة الوكالات</h1>
      <div class="muted">إدارة كاملة: عرض / تعديل / حذف / حالة ✅ أو Pending</div>
    </div>
    <div class="row" style="gap:10px">
      <button id="btnLogout" class="ghost small" style="display:none;width:auto">تسجيل خروج</button>
    </div>
  </div>

  <!-- Login -->
  <div id="loginCard" class="card p" style="max-width:520px;margin:0 auto">
    <h2>تسجيل الدخول</h2>
    <label>USER</label>
    <input id="user" value="Owner" autocomplete="username" />
    <label>PASSWORD</label>
    <input id="pass" type="password" value="Admin26" autocomplete="current-password" />
    <div class="hint">التحقق يتم داخل Worker عبر Secrets (OWNER_USER / OWNER_PASS).</div>
    <div style="height:10px"></div>
    <button id="btnLogin">دخول</button>
    <div id="loginMsg" class="hint"></div>
  </div>

  <!-- Dashboard -->
  <div id="dash" style="display:none">
    <div class="grid2" style="margin-top:16px">
      <div class="card p">
        <div class="row" style="align-items:center;justify-content:space-between">
          <h2 style="margin:0">الوكالات</h2>
          <button id="btnRefresh" class="ghost small" style="width:auto">تحديث</button>
        </div>
        <label>بحث عن وكالة</label>
        <input id="agencySearch" placeholder="مثال: mehdik أو اسم الوكالة..." />
        <div style="height:10px"></div>
        <div id="agencyList"></div>
      </div>

      <div class="card p">
        <h2 id="selectedTitle">اختر وكالة لعرض الحسابات</h2>
        <div class="row" style="gap:10px;align-items:center">
          <input id="accountSearch" placeholder="بحث داخل الحسابات (email / passport)" style="flex:1" />
          <button id="btnReloadAgency" class="ghost small" style="width:auto" disabled>Reload</button>
        </div>
        <div style="height:10px"></div>
        <div id="accountsWrap" class="muted">لا يوجد بيانات بعد.</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal edit -->
<div id="modal" class="modal">
  <div class="box">
    <h2 style="margin:0 0 10px">تعديل الحساب</h2>
    <div class="grid2">
      <div>
        <label>Email</label>
        <input id="mEmail" />
      </div>
      <div>
        <label>Passport</label>
        <input id="mPassport" />
      </div>
      <div>
        <label>Password</label>
        <input id="mPassword" />
      </div>
      <div>
        <label>Status</label>
        <select id="mStatus">
          <option value="Pending">Pending</option>
          <option value="✅">✅</option>
        </select>
      </div>
    </div>
    <div class="actions">
      <button id="mCancel" class="ghost" style="width:auto">إلغاء</button>
      <button id="mSave" style="width:auto">حفظ</button>
    </div>
    <div id="mMsg" class="hint"></div>
  </div>
</div>

<script>
  const API = "https://api.mehdik.site"; // نفس دومين API عندك
  const tokenKey = "owner_token_v1";

  let agencies = [];
  let currentAgency = "";
  let currentAccounts = [];
  let editIndex = -1;

  const el = (id) => document.getElementById(id);

  function setLoggedIn(isIn){
    el("loginCard").style.display = isIn ? "none" : "block";
    el("dash").style.display = isIn ? "block" : "none";
    el("btnLogout").style.display = isIn ? "inline-block" : "none";
  }

  function badge(status){
    const s = (status === "✅") ? "✅" : "Pending";
    const cls = (s === "✅") ? "ok" : "pending";
    return `<span class="tag ${cls}">${s}</span>`;
  }

  async function api(path, method="GET", body=null){
    const token = localStorage.getItem(tokenKey) || "";
    const headers = { "Content-Type":"application/json" };
    if (token) headers["Authorization"] = "Bearer " + token;

    const res = await fetch(API + path, {
      method,
      headers,
      body: body ? JSON.stringify(body) : null
    });

    const data = await res.json().catch(()=>({ok:false,error:"Bad JSON"}));
    if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
    return data;
  }

  async function login(){
    el("loginMsg").textContent = "";
    try{
      const user = el("user").value.trim();
      const pass = el("pass").value;
      const data = await api("/owner/login","POST",{user,pass});
      localStorage.setItem(tokenKey, data.token);
      setLoggedIn(true);
      await loadOverview();
    }catch(e){
      el("loginMsg").textContent = "فشل الدخول: " + e.message;
    }
  }

  async function loadOverview(){
    el("agencyList").innerHTML = `<div class="muted">جاري التحميل...</div>`;
    const data = await api("/owner/overview","GET");
    agencies = data.agencies || [];
    renderAgencies();
  }

  function renderAgencies(){
    const q = el("agencySearch").value.trim().toLowerCase();
    const list = agencies.filter(a => !q || a.agency.includes(q));
    if (!list.length){
      el("agencyList").innerHTML = `<div class="muted">لا توجد وكالات مطابقة.</div>`;
      return;
    }
    el("agencyList").innerHTML = list.map(a => `
      <div class="card p" style="margin:10px 0;background:rgba(0,0,0,.12)">
        <div class="row" style="justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:800">${a.agency}</div>
            <div class="muted">الحسابات: ${a.count} | Pending: ${a.pending} | ✅: ${a.approved}</div>
          </div>
          <button class="small" style="width:auto" onclick="selectAgency('${a.agency}')">فتح</button>
        </div>
      </div>
    `).join("");
  }

  window.selectAgency = async function(name){
    currentAgency = name;
    el("selectedTitle").textContent = "Accounts — " + name;
    el("btnReloadAgency").disabled = false;
    el("accountsWrap").innerHTML = `<div class="muted">جاري التحميل...</div>`;
    await loadAgency(name);
  }

  async function loadAgency(name){
    const data = await api("/owner/agency?name="+encodeURIComponent(name),"GET");
    currentAccounts = data.accounts || [];
    renderAccounts();
  }

  function renderAccounts(){
    const q = el("accountSearch").value.trim().toLowerCase();
    const rows = currentAccounts
      .map((a,i)=>({a,i}))
      .filter(({a})=>{
        if (!q) return true;
        return (a.email||"").toLowerCase().includes(q) || (a.passport||"").toLowerCase().includes(q);
      });

    if (!rows.length){
      el("accountsWrap").innerHTML = `<div class="muted">لا توجد نتائج.</div>`;
      return;
    }

    el("accountsWrap").innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Email</th>
            <th>Passport</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(({a,i})=>`
            <tr>
              <td>${i+1}</td>
              <td>${escapeHtml(a.email||"")}</td>
              <td>${escapeHtml(a.passport||"")}</td>
              <td>${badge(a.status)}</td>
              <td>
                <div class="row" style="gap:8px">
                  <button class="ghost small" style="width:auto" onclick="openEdit(${i})">Edit</button>
                  <button class="ghost small" style="width:auto" onclick="toggleStatus(${i})">Toggle</button>
                  <button class="danger small" style="width:auto" onclick="del(${i})">Delete</button>
                </div>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
      <div class="hint">* كلمة السر لا نعرضها هنا، لكنها قابلة للتعديل داخل Edit.</div>
    `;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  window.openEdit = function(i){
    editIndex = i;
    const a = currentAccounts[i];
    el("mEmail").value = a.email || "";
    el("mPassport").value = a.passport || "";
    el("mPassword").value = a.password || "";
    el("mStatus").value = (a.status === "✅") ? "✅" : "Pending";
    el("mMsg").textContent = "";
    el("modal").classList.add("open");
  }

  async function saveEdit(){
    el("mMsg").textContent = "";
    try{
      const account = {
        email: el("mEmail").value.trim(),
        passport: el("mPassport").value.trim().toUpperCase(),
        password: el("mPassword").value.trim(),
        status: el("mStatus").value
      };
      const data = await api("/owner/account/update","POST",{
        agency: currentAgency,
        index: editIndex,
        account
      });
      currentAccounts[editIndex] = data.account;
      el("modal").classList.remove("open");
      renderAccounts();
      await loadOverview(); // refresh counters
    }catch(e){
      el("mMsg").textContent = "فشل الحفظ: " + e.message;
    }
  }

  window.toggleStatus = async function(i){
    const cur = (currentAccounts[i].status === "✅") ? "✅" : "Pending";
    const next = (cur === "✅") ? "Pending" : "✅";
    await api("/owner/account/status","POST",{ agency: currentAgency, index: i, status: next });
    currentAccounts[i].status = next;
    renderAccounts();
    await loadOverview();
  }

  window.del = async function(i){
    if (!confirm("تأكيد حذف هذا الحساب؟")) return;
    await api("/owner/account/delete","POST",{ agency: currentAgency, index: i });
    currentAccounts.splice(i,1);
    renderAccounts();
    await loadOverview();
  }

  // events
  el("btnLogin").addEventListener("click", login);
  el("btnLogout").addEventListener("click", ()=>{
    localStorage.removeItem(tokenKey);
    setLoggedIn(false);
  });
  el("btnRefresh").addEventListener("click", loadOverview);
  el("btnReloadAgency").addEventListener("click", ()=> loadAgency(currentAgency));
  el("agencySearch").addEventListener("input", renderAgencies);
  el("accountSearch").addEventListener("input", renderAccounts);

  el("mCancel").addEventListener("click", ()=> el("modal").classList.remove("open"));
  el("mSave").addEventListener("click", saveEdit);

  // init
  (async ()=>{
    const t = localStorage.getItem(tokenKey);
    if (!t){ setLoggedIn(false); return; }
    setLoggedIn(true);
    try{ await loadOverview(); }
    catch{ localStorage.removeItem(tokenKey); setLoggedIn(false); }
  })();
</script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Owner Dashboard</title>
  <style>
    body { font-family: system-ui, Arial; margin: 0; background: #0b1020; color: #e7e9ee; }
    header { padding: 16px 20px; background: #0f1730; border-bottom: 1px solid #1c2a55; display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .wrap { padding: 18px; max-width: 1200px; margin: 0 auto; }
    .card { background: #0f1730; border: 1px solid #1c2a55; border-radius: 14px; padding: 14px; margin: 12px 0; }
    input, select, button { padding: 10px 12px; border-radius: 10px; border: 1px solid #263669; background: #0b1020; color:#e7e9ee; }
    button { cursor:pointer; }
    button.primary { background:#1b3a8a; border-color:#1b3a8a; }
    button.danger { background:#8a1b1b; border-color:#8a1b1b; }
    button.ghost { background: transparent; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .grid { display:grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 900px){ .grid { grid-template-columns: 1fr 1fr; } }
    table { width:100%; border-collapse: collapse; overflow:hidden; border-radius: 12px; }
    th, td { border-bottom: 1px solid #1c2a55; padding: 10px; text-align:right; vertical-align: top; }
    th { background:#0b1020; position: sticky; top:0; }
    .badge { padding: 4px 10px; border-radius: 999px; border:1px solid #263669; display:inline-block; }
    .ok { border-color:#2f7a3a; }
    .pending { border-color:#a67c1a; }
    .muted { opacity: .8; font-size: 12px; }
    .sep { height:1px; background:#1c2a55; margin:12px 0; }
    .hidden { display:none; }
    .right { margin-inline-start:auto; }
    .small { font-size: 13px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
<header>
  <div class="row">
    <strong>لوحة Owner</strong>
    <span class="muted">إدارة جميع agency_accounts</span>
  </div>
  <div class="row">
    <button class="ghost" id="btnLogout">Logout</button>
    <button class="primary" id="btnRefresh">Refresh</button>
  </div>
</header>

<div class="wrap">

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h3 style="margin-top:0">تسجيل الدخول</h3>
    <div class="row">
      <input id="user" placeholder="USER" value="Owner" />
      <input id="pass" placeholder="Password" type="password" value="Admin26" />
      <button class="primary" id="btnLogin">Login</button>
    </div>
    <div class="muted" id="loginMsg" style="margin-top:10px"></div>
  </div>

  <!-- DASH -->
  <div class="card hidden" id="dashCard">
    <div class="row">
      <input id="search" placeholder="بحث: وكالة / Email / Passport" style="min-width:280px; flex:1" />
      <select id="statusFilter">
        <option value="">كل الحالات</option>
        <option value="✅">✅ فقط</option>
        <option value="Pending">Pending فقط</option>
      </select>
      <span class="right muted small" id="counts"></span>
    </div>

    <div class="sep"></div>

    <div id="content"></div>
  </div>

</div>

<script>
  const API = "https://api.mehdik.site"; // worker domain
  const LS_TOKEN = "OWNER_TOKEN_V1";

  const $ = (id) => document.getElementById(id);

  function setMsg(el, txt) { el.textContent = txt || ""; }
  function badge(status) {
    const cls = status === "✅" ? "ok" : "pending";
    return `<span class="badge ${cls}">${status}</span>`;
  }

  function getToken() { return localStorage.getItem(LS_TOKEN) || ""; }
  function setToken(t) { localStorage.setItem(LS_TOKEN, t); }
  function clearToken() { localStorage.removeItem(LS_TOKEN); }

  async function apiFetch(path, opts = {}) {
    const headers = opts.headers || {};
    const token = getToken();
    if (token) headers["Authorization"] = "Bearer " + token;
    return fetch(API + path, { ...opts, headers });
  }

  async function login() {
    setMsg($("loginMsg"), "...");
    const user = $("user").value.trim();
    const pass = $("pass").value.trim();

    const res = await fetch(API + "/owner/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user, pass })
    });

    const data = await res.json().catch(()=> ({}));
    if (!res.ok || !data.ok) {
      setMsg($("loginMsg"), data.error || "Login failed");
      return;
    }
    setToken(data.token);
    setMsg($("loginMsg"), "تم تسجيل الدخول ✅");
    $("loginCard").classList.add("hidden");
    $("dashCard").classList.remove("hidden");
    await refresh();
  }

  function logout() {
    clearToken();
    $("dashCard").classList.add("hidden");
    $("loginCard").classList.remove("hidden");
    setMsg($("loginMsg"), "");
  }

  function flatten(agencies) {
    // return array of rows: {agency,email,passport,password,status,createdAt,updatedAt}
    const rows = [];
    for (const ag of agencies) {
      for (const a of (ag.accounts || [])) {
        rows.push({
          agency: ag.agency,
          email: a.email || "",
          passport: a.passport || "",
          password: a.password || "",
          status: a.status === "✅" ? "✅" : "Pending",
          createdAt: a.createdAt || "",
          updatedAt: a.updatedAt || ""
        });
      }
    }
    return rows;
  }

  function matches(row, q) {
    if (!q) return true;
    q = q.toLowerCase();
    return (row.agency || "").toLowerCase().includes(q)
        || (row.email || "").toLowerCase().includes(q)
        || (row.passport || "").toLowerCase().includes(q);
  }

  function render(agencies) {
    const q = $("search").value.trim();
    const st = $("statusFilter").value;

    const rows = flatten(agencies).filter(r => matches(r, q) && (!st || r.status === st));

    $("counts").textContent = `Results: ${rows.length}`;

    // group by agency
    const by = new Map();
    for (const r of rows) {
      if (!by.has(r.agency)) by.set(r.agency, []);
      by.get(r.agency).push(r);
    }

    let html = "";
    for (const [agency, list] of Array.from(by.entries()).sort((a,b)=>a[0].localeCompare(b[0]))) {
      html += `<div class="card">
        <div class="row">
          <strong class="mono">${agency}</strong>
          <span class="muted right">Accounts: ${list.length}</span>
        </div>
        <div style="overflow:auto; margin-top:10px">
          <table>
            <thead>
              <tr>
                <th>Status</th>
                <th>Email</th>
                <th>Password</th>
                <th>Passport</th>
                <th class="small">Updated</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${list.map(r => `
                <tr data-ag="${encodeURIComponent(r.agency)}" data-email="${encodeURIComponent(r.email)}" data-passport="${encodeURIComponent(r.passport)}">
                  <td>${badge(r.status)}</td>
                  <td><input value="${escapeHtml(r.email)}" class="inpEmail" style="min-width:220px" /></td>
                  <td><input value="${escapeHtml(r.password)}" class="inpPass" style="min-width:180px" /></td>
                  <td><input value="${escapeHtml(r.passport)}" class="inpPassport" style="min-width:160px" /></td>
                  <td class="muted small">${escapeHtml(r.updatedAt || r.createdAt || "")}</td>
                  <td>
                    <div class="row" style="gap:8px">
                      <select class="selStatus">
                        <option value="✅" ${r.status==="✅"?"selected":""}>✅</option>
                        <option value="Pending" ${r.status==="Pending"?"selected":""}>Pending</option>
                      </select>
                      <button class="primary btnSave">Save</button>
                      <button class="danger btnDel">Delete</button>
                    </div>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    $("content").innerHTML = html || `<div class="muted">لا توجد نتائج</div>`;

    // bind
    document.querySelectorAll(".btnSave").forEach(btn => {
      btn.addEventListener("click", onSave);
    });
    document.querySelectorAll(".btnDel").forEach(btn => {
      btn.addEventListener("click", onDelete);
    });
    document.querySelectorAll(".selStatus").forEach(sel => {
      sel.addEventListener("change", onStatus);
    });
  }

  function escapeHtml(s) {
    return String(s || "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  let cache = { agencies: [] };

  async function refresh() {
    $("btnRefresh").disabled = true;
    try {
      const res = await apiFetch("/owner/all", { method: "GET" });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok || !data.ok) {
        if ((data.error || "").includes("expired")) logout();
        alert(data.error || "Failed");
        return;
      }
      cache.agencies = data.agencies || [];
      // counts
      const totalAg = cache.agencies.length;
      const totalAcc = flatten(cache.agencies).length;
      $("counts").textContent = `Agencies: ${totalAg} | Accounts: ${totalAcc}`;
      render(cache.agencies);
    } finally {
      $("btnRefresh").disabled = false;
    }
  }

  async function onSave(e) {
    const tr = e.target.closest("tr");
    const agency = decodeURIComponent(tr.getAttribute("data-ag"));
    const emailOld = decodeURIComponent(tr.getAttribute("data-email"));
    const passportOld = decodeURIComponent(tr.getAttribute("data-passport"));

    const newEmail = tr.querySelector(".inpEmail").value.trim();
    const newPassword = tr.querySelector(".inpPass").value;
    const newPassport = tr.querySelector(".inpPassport").value.trim();

    e.target.disabled = true;
    try {
      const res = await apiFetch("/owner/account/update", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({
          agency,
          email: emailOld,
          passport: passportOld,
          newEmail,
          newPassword,
          newPassport
        })
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok || !data.ok) {
        alert(data.error || "Update failed");
        return;
      }
      await refresh();
    } finally {
      e.target.disabled = false;
    }
  }

  async function onDelete(e) {
    if (!confirm("تأكيد الحذف؟")) return;

    const tr = e.target.closest("tr");
    const agency = decodeURIComponent(tr.getAttribute("data-ag"));
    const email = decodeURIComponent(tr.getAttribute("data-email"));
    const passport = decodeURIComponent(tr.getAttribute("data-passport"));

    e.target.disabled = true;
    try {
      const res = await apiFetch("/owner/account/delete", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ agency, email, passport })
      });
      const data = await res.json().catch(()=> ({}));
      if (!res.ok || !data.ok) {
        alert(data.error || "Delete failed");
        return;
      }
      await refresh();
    } finally {
      e.target.disabled = false;
    }
  }

  async function onStatus(e) {
    const tr = e.target.closest("tr");
    const agency = decodeURIComponent(tr.getAttribute("data-ag"));
    const email = decodeURIComponent(tr.getAttribute("data-email"));
    const passport = decodeURIComponent(tr.getAttribute("data-passport"));
    const status = e.target.value;

    const res = await apiFetch("/owner/account/set_status", {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ agency, email, passport, status })
    });
    const data = await res.json().catch(()=> ({}));
    if (!res.ok || !data.ok) {
      alert(data.error || "Status update failed");
      return;
    }
    // لا نعمل refresh كامل لتخفيف الضغط، لكن الأفضل لضمان تزامن:
    await refresh();
  }

  $("btnLogin").addEventListener("click", login);
  $("btnLogout").addEventListener("click", logout);
  $("btnRefresh").addEventListener("click", refresh);
  $("search").addEventListener("input", () => render(cache.agencies));
  $("statusFilter").addEventListener("change", () => render(cache.agencies));

  // auto session
  (async () => {
    if (getToken()) {
      $("loginCard").classList.add("hidden");
      $("dashCard").classList.remove("hidden");
      await refresh();
    }
  })();
</script>
</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Owner Panel</title>
<style>
:root{
  --bg:#f3f6fb;--card:#ffffff;--card2:#f8fbff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --primary:#2563eb;--primarySoft:#eff6ff;--success:#16a34a;--successSoft:#f0fdf4;--danger:#dc2626;--dangerSoft:#fef2f2;--warning:#d97706;--warningSoft:#fff7ed;
  --shadow:0 16px 40px rgba(15,23,42,.08);--radius:22px;--radiusSm:16px;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans Arabic","Noto Sans",sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:var(--sans);color:var(--text);background:
radial-gradient(circle at top right, rgba(37,99,235,.08), transparent 28%),
radial-gradient(circle at top left, rgba(14,165,233,.06), transparent 24%),
linear-gradient(180deg,#f8fbff 0%,#f2f5fa 100%)}
button,input,select,textarea{font:inherit}
.hidden{display:none!important}
.app{max-width:1500px;margin:0 auto;padding:24px}
.shell{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
@media (max-width:1150px){.shell{grid-template-columns:1fr}}
.card{background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow)}
.sidebar{position:sticky;top:20px;padding:18px}
@media (max-width:1150px){.sidebar{position:static}}
.brand{display:flex;align-items:center;gap:14px;padding:6px 2px 18px}
.logo{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,#0ea5e9,#2563eb 55%,#4338ca);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 16px 30px rgba(37,99,235,.22)}
.brand h1{margin:0;font-size:20px}
.brand p{margin:4px 0 0;color:var(--muted);font-size:12px}
.badgeRow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.chip,.pill,.tag{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:12px;color:var(--muted)}
.tag.good{background:#f0fdf4;color:#166534;border-color:#bbf7d0}.tag.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.tag.info{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.tag.warn{background:#fff7ed;color:#b45309;border-color:#fed7aa}
.dot{width:9px;height:9px;border-radius:999px;background:#94a3b8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.label{display:block;margin:0 0 8px;font-size:12px;color:var(--muted)}
.field{margin-bottom:12px}
.input,select,textarea,input{width:100%;border:1px solid var(--line);background:#fff;padding:12px 14px;border-radius:16px;outline:none;color:var(--text);transition:.18s border,.18s box-shadow,.18s transform}
.input:focus,select:focus,textarea:focus,input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
textarea{min-height:180px;resize:vertical}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:11px 14px;border-radius:15px;font-weight:700;cursor:pointer;transition:.18s transform,.18s box-shadow,.18s border,.18s background;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(15,23,42,.06)}
.btn.primary{background:var(--primarySoft);border-color:#bfdbfe;color:#1d4ed8}
.btn.good{background:var(--successSoft);border-color:#bbf7d0;color:#15803d}
.btn.danger{background:var(--dangerSoft);border-color:#fecaca;color:#b91c1c}
.btn.warn{background:var(--warningSoft);border-color:#fed7aa;color:#b45309}
.btn[disabled]{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.sideActions{display:grid;gap:10px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
@media (max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{padding:18px;border-radius:20px;background:linear-gradient(180deg,#fff,#f9fbff);border:1px solid var(--line)}
.kpi b{display:block;font-size:28px;line-height:1;margin-bottom:8px}
.kpi span{font-size:13px;color:var(--muted)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;padding:18px}
@media (max-width:900px){.topbar{flex-direction:column;align-items:stretch}}
.tabs{display:flex;gap:10px;flex-wrap:wrap}
.tabbtn{border:1px solid var(--line);background:#fff;color:var(--text);padding:11px 16px;border-radius:14px;font-weight:800;cursor:pointer}
.tabbtn.active{background:var(--primarySoft);border-color:#bfdbfe;color:#1d4ed8}
.panel{padding:18px}
.panelHead{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
@media (max-width:900px){.panelHead{flex-direction:column;align-items:stretch}}
.panelHead h2{margin:0;font-size:18px}
.panelHead .actions{justify-content:flex-end}
.filters{display:grid;grid-template-columns:1.1fr 1fr .7fr .9fr;gap:12px;margin-bottom:14px}
@media (max-width:1100px){.filters{grid-template-columns:1fr 1fr}} @media (max-width:700px){.filters{grid-template-columns:1fr}}
.tablewrap{border:1px solid var(--line);border-radius:20px;overflow:auto;background:#fff}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:900px}
thead th{position:sticky;top:0;background:#f8fbff;color:var(--muted);font-size:12px;font-weight:800;text-align:right;padding:14px 12px;border-bottom:1px solid var(--line)}
tbody td{padding:13px 12px;border-bottom:1px solid #eef2f7;font-size:13px;vertical-align:middle;white-space:nowrap}
tbody tr:hover{background:#fbfdff}
.status{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid var(--line);background:#fff}
.s-good{background:#f0fdf4;color:#166534;border-color:#bbf7d0}.s-bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.s-neutral{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.s-warn{background:#fff7ed;color:#b45309;border-color:#fed7aa}
.sectionGrid{display:grid;grid-template-columns:1fr;gap:18px}
.stack{display:grid;gap:18px}
.subcard{padding:18px}
.subHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.subHead h3{margin:0;font-size:16px}
.empty{padding:26px 18px;text-align:center;color:var(--muted)}
.toast{position:fixed;left:20px;bottom:20px;max-width:360px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px;padding:14px 16px;display:none;z-index:60}
.toast.show{display:block}
.toast b{display:block;margin-bottom:5px}.toast span{color:var(--muted);font-size:13px;line-height:1.6;white-space:pre-wrap}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:20px;z-index:70}
.modal.show{display:flex}
.box{width:min(920px,100%);background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 20px 60px rgba(15,23,42,.22);overflow:hidden}
.modalHd,.modalFt{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line)}
.modalFt{border-bottom:none;border-top:1px solid var(--line);justify-content:flex-start;flex-wrap:wrap}
.modalBd{padding:20px}
.list{list-style:none;margin:0;padding:0;display:grid;gap:10px;max-height:320px;overflow:auto}
.list li{padding:12px 14px;border:1px solid var(--line);border-radius:16px;background:#fbfdff}
.mono{font-family:var(--mono)}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <aside class="card sidebar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Owner Panel</h1>
          <p id="apiHost">…</p>
        </div>
      </div>
      <div class="badgeRow">
        <span class="pill"><span class="dot"></span><span id="pillText">غير متصل</span></span>
        <span class="chip">Auth: <b id="authState">Guest</b></span>
      </div>
      <div class="field">
        <label class="label">User</label>
        <input id="inUser" placeholder="admin" />
      </div>
      <div class="field">
        <label class="label">Password</label>
        <input id="inPass" type="password" placeholder="••••••••" />
      </div>
      <div class="sideActions">
        <button class="btn primary" id="btnLogin">Login</button>
        <div class="grid2">
          <button class="btn" id="btnPing">Ping</button>
          <button class="btn danger" id="btnLogout" disabled>Logout</button>
        </div>
      </div>
    </aside>

    <main>
      <div class="card topbar">
        <div class="tabs">
          <button class="tabbtn active" data-tab="accountsTab">الحسابات</button>
          <button class="tabbtn" data-tab="managersTab">المديرين</button>
        </div>
        <div class="actions">
          <button class="btn" id="btnRefresh" disabled>Refresh</button>
          <button class="btn" id="btnSendAgencyAll" disabled>Send Agency → Telegram</button>
        </div>
      </div>

      <section id="accountsTab" class="tabpane">
        <div class="card panel">
          <div class="panelHead">
            <div></div>
            <div class="actions">
              <button class="btn" id="btnBulk" disabled>Bulk Paste</button>
              <button class="btn primary" id="btnAddOne" disabled>Add Account</button>
            </div>
          </div>
          <div class="filters">
            <div>
              <label class="label">Agency</label>
              <select id="selAgency" disabled></select>
            </div>
            <div>
              <label class="label">Search</label>
              <input id="inSearch" placeholder="email / passport / status" disabled />
            </div>
            <div>
              <label class="label">Status</label>
              <select id="selStatusFilter" disabled>
                <option value="">All</option>
                <option>Pending</option>
                <option>In Progress</option>
                <option>Done</option>
                <option>Rejected</option>
              </select>
            </div>
            <div>
              <label class="label">Type</label>
              <select id="selTypeFilter" disabled>
                <option value="">All</option>
                <option>Appointment</option>
                <option>Waiting list</option>
              </select>
            </div>
          </div>

          <div class="kpis">
            <div class="kpi"><b id="kpiAgencies">0</b><span>Agencies</span></div>
            <div class="kpi"><b id="kpiAccounts">0</b><span>Accounts</span></div>
            <div class="kpi"><b id="kpiManagers">0</b><span>Managers</span></div>
            <div class="kpi"><b id="kpiPending">0</b><span>Pending / In Progress</span></div>
          </div>

          <div class="tablewrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Agency</th>
                  <th>Email</th>
                  <th>Password</th>
                  <th>Passport</th>
                  <th>Status</th>
                  <th>Type</th>
                  <th>Manager</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="accountsBody">
                <tr><td colspan="9" class="empty">سجّل الدخول لعرض الحسابات</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="managersTab" class="tabpane hidden">
        <div class="card panel">
          <div class="panelHead">
            <h2>المديرين</h2>
            <div class="actions">
              <button class="btn primary" id="btnAddManager" disabled>Add Manager</button>
            </div>
          </div>

          <div class="tablewrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>ID</th>
                  <th>Desired</th>
                  <th>Assigned</th>
                  <th>Active</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="managersBody">
                <tr><td colspan="7" class="empty">لا يوجد مديرون</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<div class="toast" id="toast"><b id="toastTitle"></b><span id="toastMsg"></span></div>

<div class="modal" id="modalAccount">
  <div class="box">
    <div class="modalHd">
      <strong id="modalAccountTitle">Add Account</strong>
      <button class="btn" data-close="modalAccount">Close</button>
    </div>
    <div class="modalBd">
      <div class="grid2">
        <div class="field">
          <label class="label">Agency</label>
          <select id="mAgency"></select>
        </div>
        <div class="field">
          <label class="label">Status</label>
          <select id="mStatus">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Done</option>
            <option>Rejected</option>
          </select>
        </div>
        <div class="field">
          <label class="label">Type</label>
          <select id="mType">
            <option>Waiting list</option>
            <option>Appointment</option>
          </select>
        </div>
        <div class="field">
          <label class="label">Email</label>
          <input id="mEmail" placeholder="name@email.com" />
        </div>
        <div class="field">
          <label class="label">Password</label>
          <input id="mPassword" placeholder="password" />
        </div>
        <div class="field">
          <label class="label">Passport</label>
          <input id="mPassport" placeholder="AB123456" />
        </div>
      </div>
    </div>
    <div class="modalFt">
      <button class="btn primary" id="btnSaveAccount">Save</button>
      <button class="btn" data-close="modalAccount">Cancel</button>
    </div>
  </div>
</div>

<div class="modal" id="modalBulk">
  <div class="box">
    <div class="modalHd">
      <strong>Bulk Paste</strong>
      <button class="btn" data-close="modalBulk">Close</button>
    </div>
    <div class="modalBd">
      <div class="grid2">
        <div class="field">
          <label class="label">Agency</label>
          <select id="bulkAgency"></select>
        </div>
        <div class="field">
          <label class="label">Default Status</label>
          <select id="bulkStatus">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Done</option>
            <option>Rejected</option>
          </select>
        </div>
        <div class="field">
          <label class="label">Default Type</label>
          <select id="bulkType">
            <option>Waiting list</option>
            <option>Appointment</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="label">Paste lines: email;password;passport;status;type</label>
        <textarea id="bulkText" placeholder="a@x.com;123;AB123456;Pending;Appointment"></textarea>
      </div>
    </div>
    <div class="modalFt">
      <button class="btn primary" id="btnSaveBulk">Save Bulk</button>
      <button class="btn" data-close="modalBulk">Cancel</button>
    </div>
  </div>
</div>

<div class="modal" id="modalManager">
  <div class="box">
    <div class="modalHd">
      <strong id="modalManagerTitle">Add Manager</strong>
      <button class="btn" data-close="modalManager">Close</button>
    </div>
    <div class="modalBd">
      <div class="grid2">
        <div class="field">
          <label class="label">Name</label>
          <input id="mgName" placeholder="Manager name" />
        </div>
        <div class="field">
          <label class="label">ID</label>
          <input id="mgId" placeholder="manager01" />
        </div>
        <div class="field">
          <label class="label">Desired Count</label>
          <input id="mgDesired" type="number" min="1" value="8" />
        </div>
        <div class="field">
          <label class="label">Active</label>
          <select id="mgActive">
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modalFt">
      <button class="btn primary" id="btnSaveManager">Save</button>
      <button class="btn" data-close="modalManager">Cancel</button>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://example.com";
const $ = (s) => document.querySelector(s);
const $$ = (s) => [...document.querySelectorAll(s)];

const state = {
  user: "",
  pass: "",
  authed: false,
  agencies: [],
  accounts: [],
  managers: [],
  selectedAgency: "",
  search: "",
  statusFilter: "",
  typeFilter: "",
  editing: null,
  editingManager: null,
};

const apiHost = $("#apiHost");
const pillText = $("#pillText");
const authState = $("#authState");

const inUser = $("#inUser");
const inPass = $("#inPass");
const btnLogin = $("#btnLogin");
const btnLogout = $("#btnLogout");
const btnPing = $("#btnPing");
const btnRefresh = $("#btnRefresh");
const btnBulk = $("#btnBulk");
const btnAddOne = $("#btnAddOne");
const btnSendAgencyAll = $("#btnSendAgencyAll");
const btnAddManager = $("#btnAddManager");

const selAgency = $("#selAgency");
const inSearch = $("#inSearch");
const selStatusFilter = $("#selStatusFilter");
const selTypeFilter = $("#selTypeFilter");

const accountsBody = $("#accountsBody");
const managersBody = $("#managersBody");

const kpiAgencies = $("#kpiAgencies");
const kpiAccounts = $("#kpiAccounts");
const kpiManagers = $("#kpiManagers");
const kpiPending = $("#kpiPending");

const modalAccount = $("#modalAccount");
const modalBulk = $("#modalBulk");
const modalManager = $("#modalManager");

const mAgency = $("#mAgency");
const mStatus = $("#mStatus");
const mType = $("#mType");
const mEmail = $("#mEmail");
const mPassword = $("#mPassword");
const mPassport = $("#mPassport");
const modalAccountTitle = $("#modalAccountTitle");
const btnSaveAccount = $("#btnSaveAccount");

const bulkAgency = $("#bulkAgency");
const bulkStatus = $("#bulkStatus");
const bulkType = $("#bulkType");
const bulkText = $("#bulkText");
const btnSaveBulk = $("#btnSaveBulk");

const mgName = $("#mgName");
const mgId = $("#mgId");
const mgDesired = $("#mgDesired");
const mgActive = $("#mgActive");
const modalManagerTitle = $("#modalManagerTitle");
const btnSaveManager = $("#btnSaveManager");

const toast = $("#toast");
const toastTitle = $("#toastTitle");
const toastMsg = $("#toastMsg");

apiHost.textContent = API_BASE;

function showToast(title, msg){
  toastTitle.textContent = title || "Notice";
  toastMsg.textContent = msg || "";
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove("show"), 2600);
}

function esc(v){
  return String(v ?? "").replace(/[&<>"']/g, (m) => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[m]);
}

function headers(){
  return {
    "Content-Type":"application/json",
    "X-Owner-User": state.user,
    "X-Owner-Pass": state.pass
  };
}

function setAuthUI(ok){
  state.authed = !!ok;
  authState.textContent = ok ? "Logged In" : "Guest";
  pillText.textContent = ok ? "متصل" : "غير متصل";
  btnLogout.disabled = !ok;
  btnRefresh.disabled = !ok;
  btnBulk.disabled = !ok;
  btnAddOne.disabled = !ok;
  btnAddManager.disabled = !ok;
  selAgency.disabled = !ok;
  inSearch.disabled = !ok;
  selStatusFilter.disabled = !ok;
  selTypeFilter.disabled = !ok;
  btnSendAgencyAll.disabled = !ok || !state.selectedAgency;
}

async function api(path, opts = {}){
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: { ...(opts.headers || {}), ...(state.authed ? headers() : {}) }
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok) throw new Error(data?.error || ("HTTP " + res.status));
  return data;
}

function badgeClassByStatus(status){
  switch((status || "").trim()){
    case "Done": return "s-good";
    case "Rejected": return "s-bad";
    case "In Progress": return "s-neutral";
    default: return "s-warn";
  }
}

function typeBadgeClass(type){
  return (type || "").trim() === "Appointment" ? "tag info" : "tag warn";
}

function managerBadgeClass(type){
  return (type || "").trim() === "Appointment" ? "tag info" : "tag";
}

function renderAgencies(){
  const opts = state.agencies.map(a => `<option value="${esc(a.agency)}">${esc(a.agency)} (${a.count})</option>`).join("");
  selAgency.innerHTML = `<option value="">Select agency</option>` + opts;
  mAgency.innerHTML = `<option value="">Select agency</option>` + opts;
  bulkAgency.innerHTML = `<option value="">Select agency</option>` + opts;

  if(state.selectedAgency && state.agencies.some(a => a.agency === state.selectedAgency)){
    selAgency.value = state.selectedAgency;
  } else {
    state.selectedAgency = "";
    selAgency.value = "";
  }
  btnSendAgencyAll.disabled = !state.authed || !state.selectedAgency;
}

function filteredAccounts(){
  return state.accounts.filter(a => {
    const s = (state.search || "").trim().toLowerCase();
    const okSearch = !s || [a.agency,a.email,a.password,a.passport,a.status,a.manager,a.type].some(v => String(v || "").toLowerCase().includes(s));
    const okStatus = !state.statusFilter || a.status === state.statusFilter;
    const okType = !state.typeFilter || (a.type || "Waiting list") === state.typeFilter;
    return okSearch && okStatus && okType;
  });
}

function renderAccounts(){
  const rows = filteredAccounts();
  kpiAccounts.textContent = state.accounts.length;
  kpiPending.textContent = state.accounts.filter(a => ["Pending","In Progress"].includes(a.status)).length;

  if(!rows.length){
    accountsBody.innerHTML = `<tr><td colspan="9" class="empty">لا توجد بيانات</td></tr>`;
    return;
  }

  accountsBody.innerHTML = rows.map((a, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${esc(a.agency || "")}</td>
      <td>${esc(a.email || "")}</td>
      <td class="mono">${esc(a.password || "")}</td>
      <td class="mono">${esc(a.passport || "")}</td>
      <td><span class="status ${badgeClassByStatus(a.status)}">${esc(a.status || "Pending")}</span></td>
      <td><span class="${typeBadgeClass(a.type)}">${esc(a.type || "Waiting list")}</span></td>
      <td><span class="${managerBadgeClass(a.type)}">${esc(a.manager || "-")}</span></td>
      <td>
        <div class="actions">
          <button class="btn" onclick='editAccount(${JSON.stringify(i)})'>Edit</button>
          <button class="btn danger" onclick='removeAccount(${JSON.stringify(i)})'>Delete</button>
        </div>
      </td>
    </tr>
  `).join("");
}

function renderManagers(){
  kpiManagers.textContent = state.managers.length;

  if(!state.managers.length){
    managersBody.innerHTML = `<tr><td colspan="7" class="empty">لا يوجد مديرون</td></tr>`;
    return;
  }

  managersBody.innerHTML = state.managers.map((m, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${esc(m.name || "")}</td>
      <td class="mono">${esc(m.id || "")}</td>
      <td>${esc(m.desiredCount || 0)}</td>
      <td>${esc(m.assignedCount || 0)}</td>
      <td><span class="${m.isActive ? 'tag good' : 'tag bad'}">${m.isActive ? 'Yes' : 'No'}</span></td>
      <td>
        <div class="actions">
          <button class="btn" onclick='editManager(${JSON.stringify(i)})'>Edit</button>
          <button class="btn danger" onclick='removeManager(${JSON.stringify(i)})'>Delete</button>
        </div>
      </td>
    </tr>
  `).join("");
}

async function loadAgencies(){
  const data = await api("/owner/agencies");
  state.agencies = data.agencies || [];
  kpiAgencies.textContent = state.agencies.length;
  renderAgencies();
}

async function loadAccounts(){
  if(!state.selectedAgency){
    state.accounts = [];
    renderAccounts();
    return;
  }
  const data = await api("/owner/accounts?agency=" + encodeURIComponent(state.selectedAgency));
  state.accounts = (data.accounts || []).map(a => ({
    ...a,
    type: a.type || "Waiting list",
    manager: a.manager || "-"
  }));
  renderAccounts();
}

async function loadManagers(){
  const data = await api("/owner/managers");
  state.managers = data.managers || [];
  renderManagers();
}

async function refreshAll(){
  if(!state.authed) return;
  await loadAgencies();
  await Promise.all([loadAccounts(), loadManagers()]);
}

function openModal(id){ $("#" + id).classList.add("show"); }
function closeModal(id){ $("#" + id).classList.remove("show"); }

$$("[data-close]").forEach(btn => {
  btn.addEventListener("click", () => closeModal(btn.dataset.close));
});

$$(".tabbtn").forEach(btn => {
  btn.addEventListener("click", () => {
    $$(".tabbtn").forEach(x => x.classList.remove("active"));
    btn.classList.add("active");
    $$(".tabpane").forEach(x => x.classList.add("hidden"));
    $("#" + btn.dataset.tab).classList.remove("hidden");
  });
});

btnPing.addEventListener("click", async () => {
  try{
    await fetch(API_BASE + "/owner/ping");
    showToast("Ping", "API reachable");
  }catch{
    showToast("Ping", "API not reachable");
  }
});

btnLogin.addEventListener("click", async () => {
  try{
    state.user = inUser.value.trim();
    state.pass = inPass.value.trim();
    const data = await fetch(API_BASE + "/owner/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ user: state.user, pass: state.pass })
    }).then(r => r.json().then(d => ({ ok:r.ok, data:d })));

    if(!data.ok || !data.data.ok) throw new Error("Login failed");

    setAuthUI(true);
    await refreshAll();
    showToast("Login", "Success");
  }catch(err){
    setAuthUI(false);
    showToast("Login failed", err.message || "Invalid credentials");
  }
});

btnLogout.addEventListener("click", () => {
  state.user = "";
  state.pass = "";
  state.accounts = [];
  state.managers = [];
  state.agencies = [];
  state.selectedAgency = "";
  setAuthUI(false);
  renderAccounts();
  renderManagers();
  renderAgencies();
  kpiAgencies.textContent = "0";
  kpiAccounts.textContent = "0";
  kpiManagers.textContent = "0";
  kpiPending.textContent = "0";
  showToast("Logout", "Done");
});

btnRefresh.addEventListener("click", async () => {
  try{
    await refreshAll();
    showToast("Refresh", "Updated");
  }catch(err){
    showToast("Refresh failed", err.message || "Error");
  }
});

selAgency.addEventListener("change", async () => {
  state.selectedAgency = selAgency.value;
  btnSendAgencyAll.disabled = !state.authed || !state.selectedAgency;
  try{
    await loadAccounts();
  }catch(err){
    showToast("Load accounts failed", err.message || "Error");
  }
});

inSearch.addEventListener("input", () => {
  state.search = inSearch.value;
  renderAccounts();
});

selStatusFilter.addEventListener("change", () => {
  state.statusFilter = selStatusFilter.value;
  renderAccounts();
});

selTypeFilter.addEventListener("change", () => {
  state.typeFilter = selTypeFilter.value;
  renderAccounts();
});

btnAddOne.addEventListener("click", () => {
  state.editing = null;
  modalAccountTitle.textContent = "Add Account";
  mAgency.value = state.selectedAgency || "";
  mStatus.value = "Pending";
  mType.value = "Waiting list";
  mEmail.value = "";
  mPassword.value = "";
  mPassport.value = "";
  openModal("modalAccount");
});

window.editAccount = function(index){
  const row = filteredAccounts()[index];
  if(!row) return;
  state.editing = row;
  modalAccountTitle.textContent = "Edit Account";
  mAgency.value = row.agency || "";
  mStatus.value = row.status || "Pending";
  mType.value = row.type || "Waiting list";
  mEmail.value = row.email || "";
  mPassword.value = row.password || "";
  mPassport.value = row.passport || "";
  openModal("modalAccount");
};

window.removeAccount = async function(index){
  const row = filteredAccounts()[index];
  if(!row) return;
  if(!confirm(`Delete ${row.email}?`)) return;

  try{
    await api("/owner/account", {
      method:"DELETE",
      headers: headers(),
      body: JSON.stringify({
        agency: row.agency,
        email: row.email,
        passport: row.passport
      })
    });
    await loadAccounts();
    await loadAgencies();
    showToast("Deleted", row.email);
  }catch(err){
    showToast("Delete failed", err.message || "Error");
  }
};

btnSaveAccount.addEventListener("click", async () => {
  const payload = {
    agency: mAgency.value.trim(),
    email: mEmail.value.trim(),
    password: mPassword.value.trim(),
    passport: mPassport.value.trim(),
    status: mStatus.value,
    type: mType.value
  };

  try{
    if(state.editing){
      payload.matchEmail = state.editing.email;
      payload.matchPassport = state.editing.passport;
      await api("/owner/account", {
        method:"PUT",
        headers: headers(),
        body: JSON.stringify(payload)
      });
      showToast("Updated", payload.email);
    } else {
      await api("/owner/account", {
        method:"POST",
        headers: headers(),
        body: JSON.stringify(payload)
      });
      showToast("Added", payload.email);
    }
    closeModal("modalAccount");
    state.selectedAgency = payload.agency;
    await loadAgencies();
    await loadAccounts();
  }catch(err){
    showToast("Save failed", err.message || "Error");
  }
});

btnBulk.addEventListener("click", () => {
  bulkAgency.value = state.selectedAgency || "";
  bulkStatus.value = "Pending";
  bulkType.value = "Waiting list";
  bulkText.value = "";
  openModal("modalBulk");
});

btnSaveBulk.addEventListener("click", async () => {
  const agency = bulkAgency.value.trim();
  const lines = bulkText.value.split(/\r?\n/).map(x => x.trim()).filter(Boolean);

  if(!agency || !lines.length){
    showToast("Bulk", "Agency or lines missing");
    return;
  }

  let ok = 0, fail = 0;
  for(const line of lines){
    const parts = line.split(";").map(x => x.trim());
    const payload = {
      agency,
      email: parts[0] || "",
      password: parts[1] || "",
      passport: parts[2] || "",
      status: parts[3] || bulkStatus.value,
      type: parts[4] || bulkType.value
    };
    try{
      await api("/owner/account", {
        method:"POST",
        headers: headers(),
        body: JSON.stringify(payload)
      });
      ok++;
    }catch{
      fail++;
    }
  }

  closeModal("modalBulk");
  state.selectedAgency = agency;
  await loadAgencies();
  await loadAccounts();
  showToast("Bulk result", `Saved: ${ok}\nFailed: ${fail}`);
});

btnSendAgencyAll.addEventListener("click", async () => {
  if(!state.selectedAgency) return;
  try{
    const data = await api("/owner/agency/send-all", {
      method:"POST",
      headers: headers(),
      body: JSON.stringify({ agency: state.selectedAgency })
    });
    showToast("Telegram", `Sent ${data.count || 0} accounts`);
  }catch(err){
    showToast("Telegram failed", err.message || "Error");
  }
});

btnAddManager.addEventListener("click", () => {
  state.editingManager = null;
  modalManagerTitle.textContent = "Add Manager";
  mgName.value = "";
  mgId.value = "";
  mgDesired.value = 8;
  mgActive.value = "true";
  openModal("modalManager");
});

window.editManager = function(index){
  const row = state.managers[index];
  if(!row) return;
  state.editingManager = row;
  modalManagerTitle.textContent = "Edit Manager";
  mgName.value = row.name || "";
  mgId.value = row.id || "";
  mgDesired.value = row.desiredCount || 8;
  mgActive.value = String(row.isActive !== false);
  openModal("modalManager");
};

window.removeManager = async function(index){
  const row = state.managers[index];
  if(!row) return;
  if(!confirm(`Delete manager ${row.name}?`)) return;

  try{
    await api("/owner/manager", {
      method:"DELETE",
      headers: headers(),
      body: JSON.stringify({ id: row.id })
    });
    await loadManagers();
    showToast("Deleted", row.name);
  }catch(err){
    showToast("Delete manager failed", err.message || "Error");
  }
};

btnSaveManager.addEventListener("click", async () => {
  const payload = {
    name: mgName.value.trim(),
    id: mgId.value.trim(),
    desiredCount: Number(mgDesired.value || 8),
    isActive: mgActive.value === "true"
  };

  try{
    if(state.editingManager){
      payload.matchId = state.editingManager.id;
      await api("/owner/manager", {
        method:"PUT",
        headers: headers(),
        body: JSON.stringify(payload)
      });
      showToast("Updated", payload.name);
    } else {
      await api("/owner/manager", {
        method:"POST",
        headers: headers(),
        body: JSON.stringify(payload)
      });
      showToast("Added", payload.name);
    }
    closeModal("modalManager");
    await loadManagers();
  }catch(err){
    showToast("Save manager failed", err.message || "Error");
  }
});

setAuthUI(false);
renderAccounts();
renderManagers();
renderAgencies();
</script>
</body>
</html>

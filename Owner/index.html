<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Owner Dashboard - agency_accounts</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    body { margin: 0; background: #0b1020; color: #eef2ff; }
    header { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,.08); display:flex; gap:12px; align-items:center; justify-content:space-between; }
    .brand { font-weight: 800; letter-spacing: .3px; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 18px; }
    .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09); border-radius: 16px; padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
    label { display:block; font-size: 12px; opacity: .85; margin-bottom: 6px; }
    input, select, button {
      border-radius: 12px; border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06); color: #eef2ff;
      padding: 10px 12px; outline: none;
    }
    input::placeholder { color: rgba(238,242,255,.55); }
    button { cursor:pointer; font-weight:700; }
    button.primary { background: rgba(99,102,241,.25); border-color: rgba(99,102,241,.55); }
    button.danger { background: rgba(239,68,68,.18); border-color: rgba(239,68,68,.45); }
    button.ghost { background: transparent; }
    .muted { opacity:.8; font-size: 12px; }
    .grid { display:grid; gap: 12px; grid-template-columns: 1fr; }
    @media (min-width: 920px){ .grid { grid-template-columns: 380px 1fr; } }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.08); vertical-align: top; }
    th { text-align: right; font-size: 12px; opacity:.85; white-space: nowrap; }
    td { font-size: 13px; }
    .pill { padding: 4px 10px; border-radius: 999px; display:inline-flex; gap:6px; align-items:center; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.06); }
    .ok { border-color: rgba(34,197,94,.4); background: rgba(34,197,94,.12); }
    .pending { border-color: rgba(245,158,11,.4); background: rgba(245,158,11,.12); }
    .topbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:space-between; margin-bottom: 10px; }
    .right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .hidden { display:none !important; }
    .err { color: #fecaca; }
    .okmsg { color: #bbf7d0; }
    .small { font-size: 12px; opacity:.85; }
  </style>
</head>
<body>
  <header>
    <div class="brand">Owner Panel</div>
    <div class="right">
      <span id="sessionInfo" class="muted"></span>
      <button id="logoutBtn" class="ghost">Logout</button>
    </div>
  </header>

  <div class="wrap">
    <div class="grid">
      <!-- Login card -->
      <div class="card" id="loginCard">
        <h3 style="margin:0 0 10px 0;">تسجيل دخول</h3>
        <div class="row">
          <div style="flex:1; min-width:160px;">
            <label>USER</label>
            <input id="user" placeholder="Owner" value="Owner" />
          </div>
          <div style="flex:1; min-width:160px;">
            <label>كلمة السر</label>
            <input id="pass" type="password" placeholder="Admin26" />
          </div>
          <button id="loginBtn" class="primary">Login</button>
        </div>
        <div id="loginMsg" class="small" style="margin-top:10px;"></div>
        <p class="muted" style="margin-top:10px;">
          يتم التحقق داخل Worker عبر Secrets. Token الجلسة صالح 12 ساعة.
        </p>
      </div>

      <!-- Main card -->
      <div class="card hidden" id="mainCard">
        <div class="topbar">
          <div class="right">
            <div>
              <label>بحث عام (agency/email/passport)</label>
              <input id="globalSearch" placeholder="ابحث..." style="min-width:260px;" />
            </div>
            <div>
              <label>اختر وكالة</label>
              <select id="agencySelect" style="min-width:240px;"></select>
            </div>
            <button id="refreshBtn" class="primary">Refresh</button>
          </div>
          <div class="right">
            <button id="deleteAgencyBtn" class="danger">Delete Agency</button>
          </div>
        </div>

        <div id="statusMsg" class="small"></div>

        <div class="row" style="margin-top:8px;">
          <div class="pill ok"><span>✅</span><span>Approved</span></div>
          <div class="pill pending"><span>⏳</span><span>Pending</span></div>
          <span class="muted">غيّر Status من هنا ليظهر في Saved Accounts.</span>
        </div>

        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Email</th>
              <th>Password</th>
              <th>Passport</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>

        <div class="muted" style="margin-top:10px;">
          ملاحظة: التعديل يتم على نفس KV keys: <code>agency_accounts:&lt;firma&gt;</code>
        </div>
      </div>
    </div>
  </div>

<script>
  const API = "https://api.mehdik.site";
  const LS_TOKEN = "OWNER_TOKEN";

  const el = (id) => document.getElementById(id);

  const loginCard = el("loginCard");
  const mainCard = el("mainCard");

  const loginBtn = el("loginBtn");
  const logoutBtn = el("logoutBtn");
  const refreshBtn = el("refreshBtn");
  const deleteAgencyBtn = el("deleteAgencyBtn");

  const loginMsg = el("loginMsg");
  const statusMsg = el("statusMsg");

  const agencySelect = el("agencySelect");
  const globalSearch = el("globalSearch");
  const rows = el("rows");
  const sessionInfo = el("sessionInfo");

  let agencies = [];
  let currentAgency = "";
  let currentAccounts = [];

  function setMsg(target, text, ok=true){
    target.className = "small " + (ok ? "okmsg" : "err");
    target.textContent = text;
  }

  function getToken(){ return localStorage.getItem(LS_TOKEN) || ""; }

  function authHeaders(){
    const t = getToken();
    return t ? { "Authorization": "Bearer " + t } : {};
  }

  async function api(path, opts={}){
    const res = await fetch(API + path, {
      ...opts,
      headers: {
        "Content-Type": "application/json",
        ...(opts.headers || {}),
        ...authHeaders(),
      }
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data?.error || ("HTTP " + res.status));
    return data;
  }

  function mask(p){
    p = String(p || "");
    if (p.length <= 2) return "••";
    return "•".repeat(Math.max(2, p.length - 2)) + p.slice(-2);
  }

  function statusBadge(s){
    return s === "approved"
      ? `<span class="pill ok">✅ Approved</span>`
      : `<span class="pill pending">⏳ Pending</span>`;
  }

  function renderTable(filterText=""){
    const f = (filterText || "").trim().toLowerCase();

    const filtered = currentAccounts
      .map((a, idx) => ({...a, _idx: idx}))
      .filter(x => {
        if (!f) return true;
        const hay = [
          currentAgency,
          x.email || "",
          x.passport || "",
          x.password || "",
          x.status || ""
        ].join(" ").toLowerCase();
        return hay.includes(f);
      });

    rows.innerHTML = filtered.map(x => {
      const s = x.status === "approved" ? "approved" : "pending";

      return `
        <tr data-idx="${x._idx}">
          <td>${x._idx}</td>
          <td><input value="${escapeHtml(x.email || "")}" data-k="email" style="width: 220px;" /></td>
          <td><input value="${escapeHtml(x.password || "")}" data-k="password" style="width: 170px;" /></td>
          <td><input value="${escapeHtml(x.passport || "")}" data-k="passport" style="width: 160px;" /></td>
          <td>
            <select data-k="status">
              <option value="pending" ${s==="pending" ? "selected":""}>Pending</option>
              <option value="approved" ${s==="approved" ? "selected":""}>✅ Approved</option>
            </select>
            <div class="small" style="margin-top:6px;">${statusBadge(s)}</div>
          </td>
          <td style="white-space:nowrap;">
            <button class="primary" data-act="save">Save</button>
            <button class="danger" data-act="delete">Delete</button>
          </td>
        </tr>
      `;
    }).join("");

    if (!filtered.length) {
      rows.innerHTML = `<tr><td colspan="6" class="muted">لا توجد نتائج.</td></tr>`;
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  async function loadAgencies(){
    const data = await api("/owner/agencies", { method: "GET" });
    agencies = data.agencies || [];
    agencySelect.innerHTML = agencies.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join("");
    if (!agencies.length){
      agencySelect.innerHTML = `<option value="">(No agencies)</option>`;
    }
    currentAgency = agencySelect.value || agencies[0] || "";
  }

  async function loadAccounts(agency){
    if (!agency) {
      currentAccounts = [];
      renderTable(globalSearch.value);
      return;
    }
    const data = await api("/owner/accounts?agency=" + encodeURIComponent(agency), { method: "GET" });
    currentAccounts = Array.isArray(data.accounts) ? data.accounts : [];
    renderTable(globalSearch.value);
  }

  async function refreshAll(){
    setMsg(statusMsg, "Loading...", true);
    await loadAgencies();
    currentAgency = agencySelect.value || currentAgency;
    await loadAccounts(currentAgency);
    setMsg(statusMsg, `Loaded ${currentAccounts.length} accounts from "${currentAgency}".`, true);
  }

  function showLoggedInUI(){
    loginCard.classList.add("hidden");
    mainCard.classList.remove("hidden");
    sessionInfo.textContent = "Logged in";
  }

  function showLoggedOutUI(){
    loginCard.classList.remove("hidden");
    mainCard.classList.add("hidden");
    sessionInfo.textContent = "";
  }

  // أحداث
  loginBtn.addEventListener("click", async () => {
    loginMsg.textContent = "";
    const user = el("user").value.trim();
    const pass = el("pass").value;

    try {
      const res = await fetch(API + "/owner/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user, pass })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data?.error || "Login failed");

      localStorage.setItem(LS_TOKEN, data.token);
      setMsg(loginMsg, "تم تسجيل الدخول ✅", true);
      showLoggedInUI();
      await refreshAll();
    } catch (e){
      setMsg(loginMsg, "خطأ: " + e.message, false);
    }
  });

  logoutBtn.addEventListener("click", () => {
    localStorage.removeItem(LS_TOKEN);
    showLoggedOutUI();
    setMsg(loginMsg, "تم تسجيل الخروج.", true);
  });

  refreshBtn.addEventListener("click", async () => {
    try { await refreshAll(); }
    catch(e){ setMsg(statusMsg, "Error: " + e.message, false); }
  });

  agencySelect.addEventListener("change", async () => {
    currentAgency = agencySelect.value;
    try {
      await loadAccounts(currentAgency);
      setMsg(statusMsg, `Loaded ${currentAccounts.length} accounts from "${currentAgency}".`, true);
    } catch (e){
      setMsg(statusMsg, "Error: " + e.message, false);
    }
  });

  globalSearch.addEventListener("input", () => {
    renderTable(globalSearch.value);
  });

  rows.addEventListener("click", async (ev) => {
    const btn = ev.target.closest("button");
    if (!btn) return;

    const tr = ev.target.closest("tr");
    if (!tr) return;

    const idx = Number(tr.getAttribute("data-idx"));
    const act = btn.getAttribute("data-act");

    if (!Number.isInteger(idx) || idx < 0) return;

    if (act === "save") {
      const inputs = tr.querySelectorAll("input, select");
      const payload = { agency: currentAgency, index: idx };
      inputs.forEach(i => payload[i.getAttribute("data-k")] = i.value);

      try {
        await api("/owner/account/update", {
          method: "POST",
          body: JSON.stringify(payload)
        });
        // تحديث local state
        currentAccounts[idx] = { ...currentAccounts[idx], ...payload };
        setMsg(statusMsg, "Saved ✅", true);
        renderTable(globalSearch.value);
      } catch (e){
        setMsg(statusMsg, "Error: " + e.message, false);
      }
    }

    if (act === "delete") {
      if (!confirm("تأكيد حذف هذا الحساب؟")) return;
      try {
        await api("/owner/account/delete", {
          method: "POST",
          body: JSON.stringify({ agency: currentAgency, index: idx })
        });
        setMsg(statusMsg, "Deleted ✅", true);
        await loadAccounts(currentAgency);
      } catch (e){
        setMsg(statusMsg, "Error: " + e.message, false);
      }
    }
  });

  deleteAgencyBtn.addEventListener("click", async () => {
    if (!currentAgency) return;
    if (!confirm(`تأكيد حذف الوكالة بالكامل؟\nAgency: ${currentAgency}`)) return;

    try {
      await api("/owner/agency/delete", {
        method: "POST",
        body: JSON.stringify({ agency: currentAgency })
      });
      setMsg(statusMsg, "Agency deleted ✅", true);
      await refreshAll();
    } catch (e){
      setMsg(statusMsg, "Error: " + e.message, false);
    }
  });

  // Auto boot
  (async function boot(){
    const t = getToken();
    if (t) {
      showLoggedInUI();
      try {
        await refreshAll();
      } catch (e){
        // session انتهت أو token خطأ
        localStorage.removeItem(LS_TOKEN);
        showLoggedOutUI();
        setMsg(loginMsg, "انتهت الجلسة. سجّل الدخول من جديد.", false);
      }
    } else {
      showLoggedOutUI();
    }
  })();
</script>
</body>
</html>

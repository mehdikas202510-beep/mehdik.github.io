<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Agency Panel</title>
  <style>
    :root{
      --bg:#070a14;
      --panel:#0e1630;
      --text:#eef2ff;
      --muted:#a6b0d4;
      --line:#22305b;
      --accent:#6aa7ff;
      --good:#3ddc97;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --radius:18px;
      --shadow: 0 12px 40px rgba(0,0,0,.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(900px 500px at 80% 10%, rgba(106,167,255,.16), transparent 55%),
        radial-gradient(700px 400px at 10% 20%, rgba(61,220,151,.10), transparent 60%),
        linear-gradient(180deg, var(--bg), #040611);
      min-height:100vh;
      padding:18px;
    }
    .wrap{max-width:1100px; margin:0 auto; display:grid; grid-template-columns: 1.1fr .9fr; gap:16px}
    @media (max-width: 980px){ .wrap{grid-template-columns:1fr} }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .head{
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .head h1, .head h2{margin:0; font-size:15px}
    .sub{margin:0; color:var(--muted); font-size:12px}
    .body{padding:14px 16px}

    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 6px}
    input, textarea, select{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(2,4,10,.55);
      color:var(--text);
      outline:none;
    }
    input:focus, textarea:focus{border-color:rgba(106,167,255,.55)}
    textarea{min-height:110px}
    .row{display:flex; gap:10px; align-items:center}
    .row > *{flex:1}
    .btn{
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(106,167,255,.18);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
      transition:.12s;
      user-select:none;
    }
    .btn:hover{transform:translateY(-1px); background:rgba(106,167,255,.25)}
    .btn.secondary{background:rgba(255,255,255,.06)}
    .btn.good{background:rgba(61,220,151,.18)}
    .btn.bad{background:rgba(255,107,107,.14)}
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:7px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.16);
      color:var(--muted);
      font-size:12px;
    }
    .dot{width:8px;height:8px;border-radius:999px;background:var(--muted)}
    .mono{font-family:var(--mono); direction:ltr; text-align:left}

    /* Saved accounts */
    .savedBox{
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      overflow:hidden;
      background:rgba(0,0,0,.12);
    }
    .savedTop{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(12,18,40,.75);
      position:sticky;
      top:0;
      z-index:2;
      backdrop-filter: blur(10px);
    }
    .savedScroll{
      max-height:520px;
      overflow:auto;
    }
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:760px;
    }
    thead th{
      position:sticky; top:0;
      background:rgba(12,18,40,.92);
      backdrop-filter: blur(8px);
      border-bottom:1px solid rgba(255,255,255,.08);
      text-align:right;
      padding:11px 10px;
      font-size:12px;
      color:var(--muted);
    }
    tbody td{
      border-bottom:1px solid rgba(255,255,255,.06);
      padding:11px 10px;
      font-size:13px;
      vertical-align:top;
    }
    tbody tr:hover td{background:rgba(106,167,255,.06)}
    .actions{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap}
    dialog{
      border:none;
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      color:var(--text);
      width:min(760px, 92vw);
      box-shadow:var(--shadow);
      padding:0;
    }
    dialog::backdrop{background:rgba(0,0,0,.55)}
    .modalHead{padding:14px 16px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; justify-content:space-between; align-items:center; gap:10px}
    .modalBody{padding:14px 16px}
    .modalFoot{padding:14px 16px; border-top:1px solid rgba(255,255,255,.08); display:flex; gap:10px; flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Left: Agency Submit -->
    <section class="card">
      <div class="head">
        <div>
          <h1>Agency Submission</h1>
          <p class="sub">إضافة حساب واحد أو عدة حسابات للوكالة</p>
        </div>
        <span class="pill"><span class="dot" style="background:var(--accent)"></span><span id="apiHint">API: -</span></span>
      </div>
      <div class="body">
        <label>Firma (Agency Signature)</label>
        <input id="firma" placeholder="مثال: Agency-01" />

        <div class="row">
          <div>
            <label>Email</label>
            <input id="email" placeholder="example@mail.com" />
          </div>
          <div>
            <label>Password</label>
            <input id="password" placeholder="••••••••" />
          </div>
        </div>

        <label>Passport</label>
        <input id="passport" placeholder="AB123456" />

        <div class="row" style="margin-top:10px">
          <button class="btn good" id="btnSendSingle">Send (Single)</button>
          <button class="btn secondary" id="btnAddToList">+ Add to List</button>
        </div>

        <label style="margin-top:14px">Multi List (Email;Password;Passport لكل سطر)</label>
        <textarea id="multiText" class="mono" placeholder="a@b.com;123;AB11&#10;x@y.com;999;CD22"></textarea>

        <div class="row" style="margin-top:10px">
          <button class="btn" id="btnSendMulti">Send (Multi)</button>
          <button class="btn secondary" id="btnClearMulti">Clear</button>
        </div>

        <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap">
          <span class="pill" id="msgPill"><span class="dot"></span><span id="msg">—</span></span>
        </div>
      </div>
    </section>

    <!-- Right: Saved Accounts -->
    <section class="card">
      <div class="head">
        <div>
          <h2>Saved Accounts</h2>
          <p class="sub">عرض الحسابات المحفوظة للوكالة (Scrollable)</p>
        </div>
        <button class="btn secondary" id="btnLoadSaved">Load</button>
      </div>

      <div class="body">
        <div class="savedBox">
          <div class="savedTop">
            <div class="row">
              <input id="savedSearch" placeholder="بحث (Email / Passport / Status)..." />
              <button class="btn" id="btnApplySearch">Search</button>
            </div>
            <p class="sub" id="savedMeta" style="margin-top:8px">—</p>
          </div>

          <div class="savedScroll">
            <table>
              <thead>
                <tr>
                  <th style="width:42px">#</th>
                  <th>Email</th>
                  <th>Passport</th>
                  <th>Password</th>
                  <th>Status</th>
                  <th style="width:230px; text-align:left">Actions</th>
                </tr>
              </thead>
              <tbody id="savedTbody">
                <tr><td colspan="6" style="color:var(--muted); padding:16px">اضغط Load لعرض البيانات.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Change password modal -->
  <dialog id="pwModal">
    <div class="modalHead">
      <h3>Change Password</h3>
      <button class="btn secondary" onclick="document.getElementById('pwModal').close()">إغلاق</button>
    </div>
    <div class="modalBody">
      <p class="pill mono" id="pwInfo">—</p>
      <label>New Password</label>
      <input id="newPw" placeholder="New password" />
    </div>
    <div class="modalFoot">
      <button class="btn good" id="btnSavePw">Save</button>
      <button class="btn secondary" onclick="document.getElementById('pwModal').close()">Cancel</button>
    </div>
  </dialog>

<script>
  const API_ENDPOINT = "https://api.mehdik.site/"; // <-- غيّره إذا لزم
  document.getElementById('apiHint').textContent = "API: " + API_ENDPOINT;

  const $ = (id)=>document.getElementById(id);

  let savedAccounts = [];
  let pwTarget = null; // {email, passport}

  function setMsg(text, kind=""){
    const dot = $('msgPill').querySelector('.dot');
    dot.style.background = kind==="good" ? "var(--good)" : kind==="bad" ? "var(--bad)" : "var(--accent)";
    $('msg').textContent = text;
  }

  function maskPassword(p){
    if(!p) return "";
    const s = String(p);
    if(s.length <= 2) return "••";
    return "•".repeat(Math.min(8, s.length-2)) + s.slice(-2);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (m)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  async function postForm(formData){
    const res = await fetch(API_ENDPOINT, { method:"POST", body: formData });
    const txt = await res.text();
    let data;
    try{ data = txt ? JSON.parse(txt) : {}; }catch(e){ data = { raw: txt }; }
    if(!res.ok){
      const msg = data?.error || data?.message || ("HTTP " + res.status);
      throw new Error(msg);
    }
    return data;
  }

  function buildSingleForm(action){
    const firma = $('firma').value.trim();
    const email = $('email').value.trim();
    const password = $('password').value;
    const passport = $('passport').value.trim();

    const fd = new FormData();
    fd.append("formType","agency");
    fd.append("action", action);
    fd.append("firma", firma);
    fd.append("email", email);
    fd.append("password", password);
    fd.append("passport", passport);
    fd.append("molti", "false");
    return {fd, firma, email, password, passport};
  }

  async function sendSingle(){
    try{
      const {fd, firma, email, passport} = buildSingleForm("add");
      if(!firma || !email || !passport) return setMsg("أدخل Firma + Email + Passport", "bad");

      // check duplicates first
      const chk = new FormData();
      chk.append("formType","agency");
      chk.append("action","check");
      chk.append("firma", firma);
      chk.append("molti","false");
      chk.append("email", $('email').value.trim());
      chk.append("password", $('password').value);
      chk.append("passport", $('passport').value.trim());

      const checkRes = await postForm(chk);
      if(checkRes?.exists){
        return setMsg("الحساب موجود مسبقاً (Duplicate).", "bad");
      }

      const res = await postForm(fd);
      setMsg("تم الإرسال ✅", "good");
      await loadSaved();
    }catch(err){
      setMsg("فشل: " + err.message, "bad");
    }
  }

  function addToList(){
    const email = $('email').value.trim();
    const password = $('password').value;
    const passport = $('passport').value.trim();
    if(!email || !password || !passport) return setMsg("أدخل Email + Password + Passport لإضافته للقائمة", "bad");

    const line = `${email};${password};${passport}`;
    const current = $('multiText').value.trim();
    $('multiText').value = current ? (current + "\n" + line) : line;
    setMsg("تمت الإضافة للقائمة ✅", "good");
  }

  async function sendMulti(){
    try{
      const firma = $('firma').value.trim();
      const accountsText = $('multiText').value.trim();
      if(!firma || !accountsText) return setMsg("أدخل Firma ثم أضف حسابات للقائمة", "bad");

      // check duplicates server-side
      const chk = new FormData();
      chk.append("formType","agency");
      chk.append("action","check");
      chk.append("firma", firma);
      chk.append("molti","true");
      chk.append("accounts", accountsText);

      const checkRes = await postForm(chk);
      if(checkRes?.duplicates?.length){
        setMsg("وجدت تكرارات — عدّل القائمة ثم أعد الإرسال", "bad");
        return;
      }

      const fd = new FormData();
      fd.append("formType","agency");
      fd.append("action","add");
      fd.append("firma", firma);
      fd.append("molti","true");
      fd.append("accounts", accountsText);

      await postForm(fd);
      setMsg("تم إرسال القائمة ✅", "good");
      await loadSaved();
    }catch(err){
      setMsg("فشل: " + err.message, "bad");
    }
  }

  async function loadSaved(){
    try{
      const firma = $('firma').value.trim();
      if(!firma) return setMsg("أدخل Firma أولاً", "bad");

      const fd = new FormData();
      fd.append("formType","agency");
      fd.append("action","list");
      fd.append("firma", firma);

      const res = await postForm(fd);
      savedAccounts = Array.isArray(res.accounts) ? res.accounts : [];
      $('savedMeta').textContent = `Total: ${savedAccounts.length}`;
      renderSaved(savedAccounts);
      setMsg("تم تحميل Saved Accounts ✅", "good");
    }catch(err){
      setMsg("فشل تحميل Saved Accounts: " + err.message, "bad");
    }
  }

  function applySavedSearch(){
    const q = $('savedSearch').value.trim().toLowerCase();
    const rows = savedAccounts.filter(a=>{
      const e = String(a.email||'').toLowerCase();
      const p = String(a.passport||'').toLowerCase();
      const s = String(a.status||'').toLowerCase();
      return !q || e.includes(q) || p.includes(q) || s.includes(q);
    });
    $('savedMeta').textContent = `Total: ${savedAccounts.length} | Showing: ${rows.length}`;
    renderSaved(rows);
  }

  function renderSaved(rows){
    const tb = $('savedTbody');
    tb.innerHTML = "";
    if(!rows.length){
      tb.innerHTML = `<tr><td colspan="6" style="color:var(--muted); padding:16px">لا توجد نتائج.</td></tr>`;
      return;
    }
    rows.forEach((a, idx)=>{
      const tr = document.createElement('tr');
      const status = a.status || 'Pending';
      tr.innerHTML = `
        <td>${idx+1}</td>
        <td class="mono">${escapeHtml(a.email||'')}</td>
        <td class="mono">${escapeHtml(a.passport||'')}</td>
        <td class="mono" title="Masked">${escapeHtml(maskPassword(a.password||''))}</td>
        <td>${escapeHtml(status)}</td>
        <td style="text-align:left">
          <div class="actions">
            <button class="btn secondary" data-act="copyEmail">Copy Email</button>
            <button class="btn secondary" data-act="copyPassport">Copy Passport</button>
            <button class="btn" data-act="pw">Change</button>
          </div>
        </td>
      `;
      tr.querySelector('[data-act="copyEmail"]').onclick = async ()=>{
        await navigator.clipboard.writeText(String(a.email||''));
        setMsg("تم نسخ Email", "good");
      };
      tr.querySelector('[data-act="copyPassport"]').onclick = async ()=>{
        await navigator.clipboard.writeText(String(a.passport||''));
        setMsg("تم نسخ Passport", "good");
      };
      tr.querySelector('[data-act="pw"]').onclick = ()=>{
        pwTarget = { email: String(a.email||''), passport: String(a.passport||'') };
        $('pwInfo').textContent = `email=${pwTarget.email} | passport=${pwTarget.passport}`;
        $('newPw').value = "";
        $('pwModal').showModal();
      };
      tb.appendChild(tr);
    });
  }

  async function saveNewPassword(){
    try{
      const firma = $('firma').value.trim();
      if(!firma) return setMsg("أدخل Firma أولاً", "bad");
      if(!pwTarget) return;
      const newPassword = $('newPw').value;
      if(!newPassword) return setMsg("أدخل كلمة مرور جديدة", "bad");

      const fd = new FormData();
      fd.append("formType","agency");
      fd.append("action","update_password");
      fd.append("firma", firma);
      fd.append("email", pwTarget.email);
      fd.append("passport", pwTarget.passport);
      fd.append("newPassword", newPassword);

      await postForm(fd);
      $('pwModal').close();
      setMsg("تم تحديث كلمة المرور ✅", "good");
      await loadSaved();
    }catch(err){
      setMsg("فشل تحديث كلمة المرور: " + err.message, "bad");
    }
  }

  $('btnSendSingle').onclick = sendSingle;
  $('btnAddToList').onclick = addToList;
  $('btnSendMulti').onclick = sendMulti;
  $('btnClearMulti').onclick = ()=>{ $('multiText').value=""; setMsg("تم مسح القائمة"); };
  $('btnLoadSaved').onclick = loadSaved;
  $('btnApplySearch').onclick = applySavedSearch;
  $('savedSearch').oninput = applySavedSearch;
  $('btnSavePw').onclick = saveNewPassword;

  setMsg("جاهز");
</script>
</body>
</html>
